<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кыз Куумай - Физика</title>
    <style>
        /* НЕГИЗГИ СТИЛДЕР */
        body { overflow: hidden; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; }
        
        .screen { 
            position: fixed; width: 100%; height: 100%; 
            display: none; flex-direction: column; align-items: center; 
            justify-content: center; background: url('bg.jpg') center/cover; 
        }

        /* МЕНЮ БАСКЫЧТАРЫ */
        .level-container {
            width: 100%; max-height: 70vh; overflow-y: auto; 
            display: flex; flex-direction: column; align-items: center;
            padding: 10px 0;
        }

        .btn { 
            width: 85%; max-width: 320px; padding: 15px; margin: 8px; 
            border-radius: 15px; border: none; font-size: 16px; 
            font-weight: bold; cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .level-btn { background: #2ecc71; color: white; border-bottom: 4px solid #27ae60; }
        .level-btn:active { transform: translateY(2px); border-bottom: 2px solid #27ae60; }

        /* ОЮН ТАЛААСЫ */
        #game-field { position: relative; width: 100%; height: 100vh; background: url('track.jpg') bottom/cover; display: none; }
        .horse-container { position: absolute; bottom: 25%; transition: left 0.6s cubic-bezier(0.25, 0.1, 0.25, 1); width: 100px; }
        
        /* СУРООЛОР БӨЛҮГҮ */
        #ui-bottom { 
            position: fixed; bottom: 0; width: 100%; 
            background: rgba(0,0,0,0.85); display: none; 
            flex-direction: column; padding: 15px; box-sizing: border-box;
            border-top: 3px solid #f1c40f;
        }
        
        #q-text { color: white; text-align: center; font-size: 18px; margin-bottom: 15px; min-height: 50px; }
        #options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .opt-btn { background: #3498db; color: white; padding: 12px; border-radius: 10px; border: none; font-weight: bold; }

        /* СКРОЛЛДУ СУЛУУЛОО */
        .level-container::-webkit-scrollbar { width: 6px; }
        .level-container::-webkit-scrollbar-thumb { background: #f1c40f; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="level-screen" class="screen" style="display: flex;">
        <h2 style="color: #f1c40f; text-shadow: 2px 2px 5px #000;">ФИЗИКА: БӨЛҮМДҮ ТАНДАҢЫЗ</h2>
        <div class="level-container">
            <button class="btn level-btn" onclick="selectLevel(0)">1. МЕХАНИКА</button>
            <button class="btn level-btn" onclick="selectLevel(1)">2. МОЛЕКУЛАЛЫК ФИЗИКА</button>
            <button class="btn level-btn" onclick="selectLevel(2)">3. ЭЛЕКТРОДИНАМИКА</button>
            <button class="btn level-btn" onclick="selectLevel(3)">4. ТЕРМЕЛҮҮЛӨР ЖАНА ТОЛКУНДАР</button>
            <button class="btn level-btn" onclick="selectLevel(4)">5. ОПТИКА</button>
            <button class="btn level-btn" onclick="selectLevel(5)">6. АТОМДУК ФИЗИКА</button>
            <button class="btn level-btn" onclick="selectLevel(6)">7. АСТРОНОМИЯ</button>
        </div>
    </div>

    <div id="setup-screen" class="screen">
        <div style="background: rgba(255,255,255,0.1); padding: 20px; border-radius: 20px; backdrop-filter: blur(10px); width: 85%; max-width: 350px; text-align: center;">
            <h2 id="display-level-name" style="color: #fff; font-size: 18px; margin-bottom: 20px;"></h2>
            
            <input type="text" id="player-name" placeholder="Атыңызды жазыңыз" class="btn" style="background: #fff; color: #333;">
            
            <div id="room-controls">
                <button class="btn" style="background: #e67e22; color: white;" onclick="createRoom()">Бөлмө ачуу</button>
                <div style="color: #eee; margin: 10px 0;">— же —</div>
                <input type="number" id="room-input" placeholder="Кодду жазыңыз" class="btn" style="background: #fff; color: #333;">
                <button class="btn" style="background: #3498db; color: white;" onclick="joinRoom()">Оюнга кошулуу</button>
            </div>
            
            <div id="wait-status" style="color: #f1c40f; margin-top: 15px; font-size: 14px;"></div>
            <button class="btn" style="background: #95a5a6; width: 120px; margin-top: 20px;" onclick="location.reload()">Артка</button>
        </div>
    </div>

    <div id="sync-overlay" class="screen">
        <h1 id="countdown" style="font-size: 60px; color: white;">ДАЯРБЫ?</h1>
        <button id="ready-btn" class="btn" style="background: #f1c40f;" onclick="triggerReady()">МЕН ДАЯРМЫН!</button>
        <p id="sync-info" style="color: white; margin-top: 10px;"></p>
    </div>

    <div id="game-field">
        <div id="boy-container" class="horse-container" style="left: 5%;"><img src="boy.png" alt="Жигит"></div>
        <div id="girl-container" class="horse-container" style="left: 45%;"><img src="girl.png" alt="Кыз"></div>
    </div>

    <div id="ui-bottom">
        <div id="q-text">Суроо жүктөлүүдө...</div>
        <div id="options"></div>
    </div>

    <div id="leaderboard-screen" class="screen"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        // FIREBASE КОНФИГУРАЦИЯСЫ
        const firebaseConfig = { databaseURL: "https://kyz-kuumay-game-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
    </script>
    
    <script src="questions.js"></script>
    <script src="game-logic.js"></script>

</body>
</html>
