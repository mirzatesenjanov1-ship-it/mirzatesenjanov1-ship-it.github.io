<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кыз Куумай: Физика Деңгээлдер</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        /* Сиздин мурунку стилдериңиз сакталат */
        * { box-sizing: border-box; touch-action: manipulation; }
        body, html { margin: 0; padding: 0; width: 100%; min-height: 100%; overflow-x: hidden; font-family: 'Segoe UI', sans-serif; background: #fff; }
        
        #setup-screen, #level-screen, #sync-overlay {
            position: fixed; inset: 0; background: white; z-index: 3000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center;
        }
        #level-screen { display: none; overflow-y: auto; }
        #sync-overlay { background: rgba(0,0,0,0.95); color: white; display: none; z-index: 4000; }

        .level-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 500px; margin-top: 20px; }
        .level-btn { padding: 20px; background: #f3f3f3; border: 2px solid #2ecc71; border-radius: 15px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .level-btn:hover { background: #2ecc71; color: white; }

        .game-area { position: relative; width: 100%; height: 40vh; border-bottom: 2px solid #eee; background: #fdfdfd; }
        .rider { position: absolute; bottom: 10px; width: 25%; max-width: 140px; transition: left 0.4s ease; }
        .rider video { width: 100%; border-radius: 10px; }
        
        .quiz-area { width: 100%; min-height: 60vh; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .btn { padding: 15px; margin: 5px; width: 100%; max-width: 400px; border-radius: 12px; border: 1px solid #ddd; background: #fff; font-weight: 600; cursor: pointer; }
        .correct-flash { background-color: #2ecc71 !important; color: white !important; }
        .wrong-flash { background-color: #e74c3c !important; color: white !important; }
        
        #countdown { font-size: 80px; font-weight: bold; color: #2ecc71; }
        .primary-btn { padding: 15px 30px; background: #2ecc71; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .secondary-btn { padding: 15px 30px; background: #3498db; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        #leaderboard-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 6000; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; }
    </style>
</head>
<body>

<audio id="bgMusic" loop><source src="music.mp3" type="audio/mpeg"></audio>

<div id="setup-screen">
    <h2>Кыз Куумай: Физика</h2>
    <input type="text" id="player-name" placeholder="Атыңыз..." style="padding:15px; border-radius:10px; width:250px; margin-bottom:15px; border: 1px solid #ccc;">
    
    <div id="room-controls">
        <button class="primary-btn" onclick="createRoom()">Бөлмө түзүү</button>
        <div style="margin: 10px 0;">— же —</div>
        <input type="text" id="room-input" placeholder="Код..." style="padding:15px; border-radius:10px; width:150px; border: 1px solid #ccc;">
        <button class="secondary-btn" onclick="joinRoom()">Кошулуу</button>
    </div>
    <p id="wait-status" style="margin-top:20px; font-weight: bold; color: #e67e22;"></p>
</div>

<div id="level-screen">
    <h2 id="level-title">Деңгээлди тандаңыз</h2>
    <div class="level-grid">
        <button class="level-btn" onclick="selectLevel(0)">1. Кинематика</button>
        <button class="level-btn" onclick="selectLevel(1)">2. Динамика</button>
        <button class="level-btn" onclick="selectLevel(2)">3. Энергия</button>
        <button class="level-btn" onclick="selectLevel(3)">4. Басым</button>
        <button class="level-btn" onclick="selectLevel(4)">5. Жылуулук</button>
        <button class="level-btn" onclick="selectLevel(5)">6. Электр</button>
        <button class="level-btn" onclick="selectLevel(6)">7. Атомдук физика</button>
    </div>
</div>

<div id="sync-overlay">
    <div id="sync-info">Даярсызбы?</div>
    <button id="master-start" class="primary-btn" onclick="triggerReady()">МЕН ДАЯРМЫН!</button>
    <div id="countdown"></div>
</div>

<div class="game-area">
    <div id="boy-container" class="rider" style="left: 5%;">
        <video id="v-boy" muted loop playsinline><source src="boy_run.mp4" type="video/mp4"></video>
    </div>
    <div id="girl-container" class="rider" style="left: 45%;">
        <video id="v-girl" muted loop playsinline><source src="girl_run.mp4" type="video/mp4"></video>
    </div>
</div>

<div class="quiz-area">
    <div id="q-text" style="font-weight: bold; font-size: 18px; margin-bottom: 20px; text-align: center;"></div>
    <div id="options" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
</div>

<div id="leaderboard-screen">
    <h1 id="winner-text">Жеңүүчү!</h1>
    <button class="secondary-btn" onclick="location.reload()">Башкы меню</button>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://kyz-kuumay-game-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myRole = "", myName = "", sessionRef = null, gameActive = false;
    let selectedLevelIdx = null;

    // СУРООЛОРДУ ДЕҢГЭЭЛДЕРГЕ БӨЛҮҮ
    const levelQuestions = [
        [ // 1. Кинематика
            {q:"Ылдамдыктын формуласы?", a:["v=s/t","v=at","v=m/s"], c:"v=s/t"},
            {q:"Траектория деген эмне?", a:["Кыймыл сызыгы","Аралык","Убакыт"], c:"Кыймыл сызыгы"}
        ],
        [ // 2. Динамика
            {q:"Ньютондун 2-закону?", a:["F=ma","F=mg","P=mv"], c:"F=ma"},
            {q:"Күчтүн бирдиги?", a:["Ньютон","Жоуль","Ватт"], c:"Ньютон"}
        ],
        [ // 3. Энергия
            {q:"Кинетикалык энергия?", a:["Ek=mv²/2","Ep=mgh","A=Fs"], c:"Ek=mv²/2"},
            {q:"Жумуштун бирдиги?", a:["Жоуль","Ватт","Паскаль"], c:"Жоуль"}
        ],
        [ // 4. Басым
            {q:"Басымдын бирдиги?", a:["Паскаль","Ньютон","Ампер"], c:"Паскаль"},
            {q:"Архимед күчү?", a:["F=ρgV","F=ma","P=mg"], c:"F=ρgV"}
        ],
        [ // 5. Жылуулук
            {q:"Заттын 3 абалы?", a:["Катуу, суюк, газ","Ысык, муздак","Жумшак, катуу"], c:"Катуу, суюк, газ"},
            {q:"Температураны өлчөөчү курал?", a:["Термометр","Барометр","Омметр"], c:"Термометр"}
        ],
        [ // 6. Электр
            {q:"Ток күчүнүн бирдиги?", a:["Ампер","Вольт","Ом"], c:"Ампер"},
            {q:"Ом закону?", a:["I=U/R","P=UI","A=Fs"], c:"I=U/R"}
        ],
        [ // 7. Атомдук
            {q:"Атомдун борборунда эмне бар?", a:["Ядро","Электрон","Протон"], c:"Ядро"},
            {q:"Электрондун заряды?", a:["Терс","Оң","Нейтрал"], c:"Терс"}
        ]
    ];

    let currentQuestions = [];

    function createRoom() {
        myName = document.getElementById('player-name').value;
        if (!myName) return alert("Атыңызды жазыңыз!");
        myRole = "boy";
        const code = Math.floor(100 + Math.random() * 899);
        document.getElementById('room-controls').style.display = "none";
        document.getElementById('wait-status').innerHTML = `Код: ${code}<br>Күтүңүз...`;
        
        sessionRef = db.ref('rooms/' + code);
        sessionRef.set({ 
            players: { boy: myName }, 
            sync: { boy: false, girl: false }, 
            pos: { boy: 0, girl: 0 }, 
            scores: { boy: 0, girl: 0 },
            level: -1 // Деңгээл тандала элек
        });

        sessionRef.child('players/girl').on('value', s => {
            if(s.exists()) {
                document.getElementById('setup-screen').style.display = "none";
                document.getElementById('level-screen').style.display = "flex";
            }
        });
    }

    function joinRoom() {
        myName = document.getElementById('player-name').value;
        const code = document.getElementById('room-input').value;
        if (!myName || !code) return alert("Маалыматты толтуруңуз!");
        myRole = "girl";
        sessionRef = db.ref('rooms/' + code);
        sessionRef.once('value', s => {
            if (s.exists() && !s.val().players.girl) {
                sessionRef.child('players/girl').set(myName);
                document.getElementById('setup-screen').style.display = "none";
                document.getElementById('wait-status').innerText = "Админ деңгээл тандап жатат...";
                
                // Деңгээл тандалганын байкоо
                sessionRef.child('level').on('value', snap => {
                    if (snap.val() !== -1) {
                        selectedLevelIdx = snap.val();
                        currentQuestions = levelQuestions[selectedLevelIdx];
                        startSync();
                    }
                });
            }
        });
    }

    function selectLevel(idx) {
        if (myRole === 'boy') {
            sessionRef.child('level').set(idx);
            selectedLevelIdx = idx;
            currentQuestions = levelQuestions[idx];
            startSync();
        }
    }

    function startSync() {
        document.getElementById('level-screen').style.display = "none";
        document.getElementById('setup-screen').style.display = "none";
        document.getElementById('sync-overlay').style.display = "flex";
        
        sessionRef.child('sync').on('value', s => {
            const sync = s.val();
            if (sync && sync.boy && sync.girl && !gameActive) startCountdown();
        });
    }

    function triggerReady() {
        sessionRef.child('sync/' + myRole).set(true);
        document.getElementById('master-start').style.display = "none";
        document.getElementById('bgMusic').play().then(() => document.getElementById('bgMusic').pause());
    }

    function startCountdown() {
        gameActive = true;
        let c = 3;
        const display = document.getElementById('countdown');
        const timer = setInterval(() => {
            display.innerText = c > 0 ? c : "GO!";
            if (c === 0) { clearInterval(timer); setTimeout(launch, 500); }
            c--;
        }, 1000);
    }

    function launch() {
        document.getElementById('sync-overlay').style.display = "none";
        document.getElementById('bgMusic').play();
        document.getElementById('v-boy').play();
        document.getElementById('v-girl').play();
        renderGame();
    }

    function renderGame() {
        let qIdx = 0;
        
        function showQ() {
            if (qIdx >= currentQuestions.length) return finishGame();
            const q = currentQuestions[qIdx];
            document.getElementById('q-text').innerText = q.q;
            const optArea = document.getElementById('options'); optArea.innerHTML = "";
            
            q.a.forEach(txt => {
                const b = document.createElement('button');
                b.className = 'btn'; b.innerText = txt;
                b.onclick = () => {
                    if (txt === q.c) {
                        let step = (myRole === 'boy') ? 5 : 3;
                        sessionRef.child('pos/' + myRole).transaction(p => (p || 0) + step);
                        sessionRef.child('scores/' + myRole).transaction(s => (s || 0) + 1);
                        b.classList.add('correct-flash');
                        setTimeout(() => { qIdx++; showQ(); }, 500);
                    } else {
                        b.classList.add('wrong-flash');
                    }
                };
                optArea.appendChild(b);
            });
        }
        showQ();

        sessionRef.child('pos').on('value', s => {
            const p = s.val();
            if (p) {
                document.getElementById('boy-container').style.left = (5 + (p.boy || 0)) + "%";
                document.getElementById('girl-container').style.left = (45 + (p.girl || 0)) + "%";
            }
        });
    }

    function finishGame() {
        document.getElementById('leaderboard-screen').style.display = "flex";
    }
</script>
</body>
</html>
