<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кыз Куумай: Физика Online</title>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1495571814896964" crossorigin="anonymous"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #ffffff;
        }
        #setup-screen, #leaderboard-screen {
            position: fixed; inset: 0; background: white; z-index: 3000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center;
        }
        #leaderboard-screen { display: none; z-index: 4000; }
        .game-area {
            position: relative; width: 100%; height: 40vh;
            background: #ffffff; border-bottom: 2px solid #f0f0f0; overflow: visible;
        }
        .rider {
            position: absolute; bottom: 10px; width: 25%; max-width: 155px;
            transition: left 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .rider video { width: 100%; display: block; }
        
        .emoji-bubble {
            position: absolute; top: -80px; left: 50%; transform: translateX(-50%);
            background: white; border-radius: 50%; padding: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); font-size: 40px; 
            z-index: 9999 !important; pointer-events: none;
            animation: floatUp 1.2s ease-out forwards; white-space: nowrap;
        }
        
        @keyframes floatUp {
            0% { opacity: 0; transform: translateX(-50%) translateY(30px); }
            20% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-100px); }
        }

        .quiz-area {
            width: 100%; height: 60vh; background: #ffffff;
            display: flex; flex-direction: column; align-items: center; padding: 10px; overflow-y: auto;
        }
        .question-text { font-size: 18px; font-weight: bold; text-align: center; margin-bottom: 15px; min-height: 50px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; max-width: 500px; }
        .btn { padding: 15px 10px; font-size: 14px; border: 1.5px solid #eee; border-radius: 12px; background: #fdfdfd; cursor: pointer; font-weight: 600; }
        .btn.correct { background: #2ecc71 !important; color: white; border-color: #2ecc71; }
        .btn.wrong { background: #e74c3c !important; color: white; border-color: #e74c3c; }
        .chat-panel { display: flex; gap: 10px; margin-top: 15px; }
        .emoji-btn { font-size: 24px; background: #f0f0f0; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; }
        
        #waiting-msg { color: #e67e22; font-weight: bold; margin: 15px 0; min-height: 24px; }
        
        .start-btn {
            padding: 15px 30px; background: #2ecc71; color: white; 
            border: none; border-radius: 30px; font-weight: bold; 
            cursor: pointer; animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(46, 204, 113, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); }
        }
    </style>
</head>
<body>

<audio id="bgMusic" loop preload="auto"><source src="music.mp3" type="audio/mpeg"></audio>

<div id="setup-screen">
    <h1>Кыз Куумай: Физика</h1>
    
    <input type="text" id="player-name" placeholder="Атыңызды жазыңыз" style="padding:15px; border-radius:10px; width:220px; border: 2px solid #eee; outline: none;">
    
    <div id="waiting-msg"></div>

    <div id="role-btns">
        <button onclick="checkAndJoin('boy')" style="background:#2980b9; color:white; padding:15px 30px; border-radius:30px; border:none; font-weight:bold; margin: 5px; cursor:pointer;">ЖИГИТ</button>
        <button onclick="checkAndJoin('girl')" style="background:#e67e22; color:white; padding:15px 30px; border-radius:30px; border:none; font-weight:bold; margin: 5px; cursor:pointer;">КЫЗ</button>
    </div>
</div>

<div id="leaderboard-screen">
    <h2>🏆 Лидерлер тактасы</h2>
    <table id="leader-body" style="width:100%; max-width:300px; border-collapse:collapse; margin: 0 auto;"></table>
    <button onclick="location.reload()" style="margin-top:20px; padding:10px 20px; background:#2ecc71; color:white; border:none; border-radius:20px;">Кайра баштоо</button>
</div>

<div class="game-area">
    <div id="boy-player" class="rider" style="left: 5%;">
        <div id="boy-chat"></div>
        <video id="v-boy" muted loop playsinline><source src="boy_run.mp4" type="video/mp4"></video>
    </div>
    <div id="girl-player" class="rider" style="left: 45%;">
        <div id="girl-chat"></div>
        <video id="v-girl" muted loop playsinline><source src="girl_run.mp4" type="video/mp4"></video>
    </div>
</div>

<div class="quiz-area">
    <div id="q-text" class="question-text">Оюн баштала элек...</div>
    <div id="options" class="options-grid"></div>
    <div class="chat-panel">
        <button class="emoji-btn" onclick="sendEmoji('😊')">😊</button>
        <button class="emoji-btn" onclick="sendEmoji('🚀')">🚀</button>
        <button class="emoji-btn" onclick="sendEmoji('😂')">😂</button>
        <button class="emoji-btn" onclick="sendEmoji('💪')">💪</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://kyz-kuumay-game-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myRole = "", myName = "", currentQIndex = 0, score = 0;
    let gameStartTime = Date.now();
    let sessionRef = null;

   const questions = [
        // 1-10: Механика жана Кыймыл
        {q:"Ылдамдыктын формуласы?", a:["v=s/t","F=ma","P=mg","E=mc2"], c:"v=s/t"},
        {q:"Ылдамдануунун бирдиги?", a:["м/с2","м/с","кг","Н"], c:"м/с2"},
        {q:"Эркин түшүү ылдамдануусу канча?", a:["9.8 м/с2","100 м/с2","5 м/с2","0 м/с2"], c:"9.8 м/с2"},
        {q:"Траектория деген эмне?", a:["Кыймылдын сызыгы","Убакыт","Күч","Масса"], c:"Кыймылдын сызыгы"},
        {q:"Спидометр эмнени өлчөйт?", a:["Ылдамдыкты","Убакытты","Күчтү","Массаны"], c:"Ылдамдыкты"},
        {q:"1 км канча метр?", a:["1000","100","10","10000"], c:"1000"},
        {q:"Убакыттын бирдиги?", a:["Секунда","Метр","Ньютон","Килограмм"], c:"Секунда"},
        {q:"Түз сызыктуу бир калыптагы кыймыл?", a:["v=const","a=const","v=0","s=0"], c:"v=const"},
        {q:"1 саатта канча секунд бар?", a:["3600","60","120","1000"], c:"3600"},
        {q:"Ылдамдыктын СИ системасындагы бирдиги?", a:["м/с","км/саат","см/с","м/мин"], c:"м/с"},

        // 11-20: Динамика (Ньютондун закондору)
        {q:"Ньютондун 2-закону?", a:["F=ma","F=mg","P=mv","E=mgh"], c:"F=ma"},
        {q:"Күчтүн бирдиги?", a:["Ньютон","Жоуль","Ватт","Паскаль"], c:"Ньютон"},
        {q:"Нерсенин инерттүүлүгүнүн өлчөмү?", a:["Масса","Күч","Ылдамдык","Убакыт"], c:"Масса"},
        {q:"Салмактын формуласы?", a:["P=mg","F=ma","p=mv","A=Fs"], c:"P=mg"},
        {q:"Серпилгичтик күчү (Гук закону)?", a:["F=-kx","F=ma","F=mg","P=mv"], c:"F=-kx"},
        {q:"Үйкөлүү күчү кайда багытталат?", a:["Кыймылга каршы","Кыймыл тарапка","Өйдө","Төмөн"], c:"Кыймылга каршы"},
        {q:"Массанын бирдиги?", a:["Килограмм","Грамм","Ньютон","Литр"], c:"Килограмм"},
        {q:"Ньютондун 1-закону?", a:["Инерция закону","F=ma","F1=-F2","P=mg"], c:"Инерция закону"},
        {q:"Ньютондун 3-закону?", a:["F1=-F2","F=ma","P=mg","v=s/t"], c:"F1=-F2"},
        {q:"Күчтү өлчөөчү курал?", a:["Динамометр","Термометр","Барометр","Спидометр"], c:"Динамометр"},

        // 21-30: Басым жана Гидростатика
        {q:"Басымдын бирдиги?", a:["Паскаль","Ньютон","Жоуль","Ватт"], c:"Паскаль"},
        {q:"Архимед күчү?", a:["F=ρgV","F=ma","F=mg","P=mv"], c:"F=ρgV"},
        {q:"Басымдын формуласы?", a:["P=F/S","P=mg","A=Fs","v=s/t"], c:"P=F/S"},
        {q:"Тыгыздыктын формуласы?", a:["ρ=m/V","P=F/S","v=s/t","m=Fa"], c:"ρ=m/V"},
        {q:"Атмосфералык басымды ким өлчөгөн?", a:["Торричелли","Ньютон","Паскаль","Архимед"], c:"Торричелли"},
        {q:"Суюктуктун ичиндеги басым?", a:["p=ρgh","p=F/S","p=mv","p=m/V"], c:"p=ρgh"},
        {q:"Паскаль закону эмнеге тиешелүү?", a:["Суюктук жана газга","Катуу нерсеге","Болгону сууга","Ташка"], c:"Суюктук жана газга"},
        {q:"Тыгыздыктын бирдиги?", a:["кг/м3","кг","м3","Н/м2"], c:"кг/м3"},
        {q:"Барометр эмнени өлчөйт?", a:["Атмосфералык басымды","Ылдамдыкты","Бийиктикти","Температураны"], c:"Атмосфералык басымды"},
        {q:"Нерсе качан сууга чөгөт?", a:["F_а < F_о","F_а > F_о","F_а = F_о","Чөкпөйт"], c:"F_а < F_о"},

        // 31-40: Жумуш, Кубаттуулук, Энергия
        {q:"Механикалык жумуш?", a:["A=Fs","P=mg","E=mgh","v=s/t"], c:"A=Fs"},
        {q:"Жумуштун бирдиги?", a:["Жоуль","Ватт","Ньютон","Вольт"], c:"Жоуль"},
        {q:"Кубаттуулуктун бирдиги?", a:["Ватт","Жоуль","Паскаль","Ампер"], c:"Ватт"},
        {q:"Кинетикалык энергия?", a:["Ek=mv2/2","Ep=mgh","A=Fs","N=A/t"], c:"Ek=mv2/2"},
        {q:"Потенциалдык энергия?", a:["Ep=mgh","Ek=mv2/2","A=Fs","p=mv"], c:"Ep=mgh"},
        {q:"Кубаттуулуктун формуласы?", a:["N=A/t","A=Fs","E=mgh","P=F/S"], c:"N=A/t"},
        {q:"Пайдалуу аракет коэффициенти (ПАК)?", a:["η=(Aп/Aт)*100%","η=At/Ap","η=Fs","η=mgh"], c:"η=(Aп/Aт)*100%"},
        {q:"Энергия сакталуу закону?", a:["Жоголбойт, түрүн өзгөртөт","Жоголот","Өсөт","Азаят"], c:"Жоголбойт, түрүн өзгөртөт"},
        {q:"1 кВт канча Ватт?", a:["1000","100","10","10000"], c:"1000"},
        {q:"Толук энергия эмнеге барабар?", a:["Ek+Ep","Ek-Ep","Ek*Ep","Ap/At"], c:"Ek+Ep"},

        // 41-50: Жөнөкөй механизмдер жана Термелүүлөр
        {q:"Жылжыбаган блок?", a:["Күчтөн утуш бербейт","2 эсе берет","10 эсе берет","Жок"], c:"Күчтөн утуш бербейт"},
        {q:"Кыймылдуу блок?", a:["2 эсе утуш берет","Бербейт","10 эсе берет","3 эсе"], c:"2 эсе утуш берет"},
        {q:"Рычагдын эрежеси кимге таандык?", a:["Архимед","Ньютон","Паскаль","Гук"], c:"Архимед"},
        {q:"Күч моменти?", a:["M=Fd","A=Fs","N=At","P=mg"], c:"M=Fd"},
        {q:"Термелүү периодунун бирдиги?", a:["Секунда","Герц","Метр","М/с"], c:"Секунда"},
        {q:"Термелүү жыштыгынын бирдиги?", a:["Герц","Секунда","Ньютон","Метр"], c:"Герц"},
        {q:"Математикалык маятниктин периоду?", a:["T=2π√(l/g)","T=1/v","T=t/n","v=s/t"], c:"T=2π√(l/g)"},
        {q:"Толкун узундугунун формуласы?", a:["λ=vT","λ=v/t","λ=Fs","λ=ma"], c:"λ=vT"},
        {q:"Үн толкуну кайсы чөйрөдө таралбайт?", a:["Вакуумда","Сууда","Абада","Темирде"], c:"Вакуумда"},
        {q:"Адам кулагы уккан жыштык?", a:["20-20000 Гц","0-10 Гц","100к Гц","1 Гц"], c:"20-20000 Гц"},

        // 51-60: Жалпы жана Кайталоо
        {q:"Импульстун формуласы?", a:["p=mv","F=ma","E=mgh","A=Fs"], c:"p=mv"},
        {q:"Дененин деформациясы?", a:["Формасынын өзгөрүшү","Тынч абалы","Кыймылы","Массасы"], c:"Формасынын өзгөрүшү"},
        {q:"Инерция деген эмне?", a:["Абалын сактоо касиети","Токтоо","Ылдамдоо","Кыйроо"], c:"Абалын сактоо касиети"},
        {q:"1 МДж канча Жоуль?", a:["1 000 000","1000","100","10 000"], c:"1 000 000"},
        {q:"Оордук күчүнүн жумушу?", a:["A=mgh","A=mv2","A=Fs","A=Nt"], c:"A=mgh"},
        {q:"Гравитациялык туруктуулук (G)?", a:["6.67x10^-11","9.8","10","1"], c:"6.67x10^-11"},
        {q:"Нерсе салмаксыздык абалда качан болот?", a:["Эркин түшүүдө","Тынч турганда","Жүгүргөндө","Сууда"], c:"Эркин түшүүдө"},
        {q:"Күч моментинин бирдиги?", a:["Н*м","Н/м","Жоуль","Ватт"], c:"Н*м"},
        {q:"Алтын эреже: күчтөн канча утсак...", a:["Жолдон ошончо утулабыз","Жолдон утабыз","Эч нерсе болбойт","Убакыт утат"], c:"Жолдон ошончо утулабыз"},
        {q:"Механикалык энергиянын түрлөрү?", a:["Кинетикалык жана Потенциалдык","Ички жана сырткы","Жылуулук","Жарык"], c:"Кинетикалык жана Потенциалдык"}
    ];

    function checkAndJoin(role) {
        const nameInput = document.getElementById('player-name');
        const msg = document.getElementById('waiting-msg');
        
        if (!nameInput.value.trim()) {
            msg.innerText = "⚠️ Атыңызды жазыңыз!";
            nameInput.style.borderColor = "#e74c3c";
            return;
        }

        myName = nameInput.value;
        myRole = role;
        msg.innerText = "Издөө жүрүүдө...";
        document.getElementById('role-btns').style.display = "none";

        db.ref('matchmaking').once('value', (snap) => {
            let foundSession = null;
            const sessions = snap.val();
            const oppositeRole = (role === 'boy') ? 'girl' : 'boy';

            if (sessions) {
                for (let id in sessions) {
                    if (sessions[id][oppositeRole] && !sessions[id][role]) {
                        foundSession = id;
                        break;
                    }
                }
            }

            if (foundSession) {
                joinGame(foundSession);
            } else {
                createGame();
            }
        });
    }

    function createGame() {
        const newId = "game_" + Math.random().toString(36).substr(2, 9);
        const msg = document.getElementById('waiting-msg');
        const partner = (myRole === 'boy') ? "кызыңызды" : "жигитиңизди";
        msg.innerHTML = `⏳ Өз ${partner} табыңыз...<br>Күтүүдө...`;

        sessionRef = db.ref('sessions/' + newId);
        const matchData = {};
        matchData[myRole] = myName;
        db.ref('matchmaking/' + newId).set(matchData);

        db.ref('matchmaking/' + newId).on('value', (snap) => {
            const data = snap.val();
            const oppositeRole = (myRole === 'boy') ? 'girl' : 'boy';
            if (data && data[oppositeRole]) {
                db.ref('matchmaking/' + newId).off();
                startGame(newId);
            }
        });
    }

    function joinGame(id) {
        db.ref('matchmaking/' + id).child(myRole).set(myName);
        startGame(id);
    }

    function startGame(id) {
        sessionRef = db.ref('sessions/' + id);
        gameStartTime = Date.now();
        const msg = document.getElementById('waiting-msg');

        // Биринчи оюнчуга активдештирүү баскычын көрсөтүү (браузердин чектөөсү үчүн)
        if (msg.innerHTML.includes("күтүүдө")) {
            msg.innerHTML = `<button onclick="activateMedia()" class="start-btn">ОЮНДУ БАШТОО 🚀</button>`;
        } else {
            activateMedia();
        }
    }

    function activateMedia() {
        document.getElementById('bgMusic').play().catch(e => console.log("Audio block"));
        document.getElementById('v-boy').play().catch(e => console.log("Video block"));
        document.getElementById('v-girl').play().catch(e => console.log("Video block"));
        
        document.getElementById('setup-screen').style.display = 'none';
        
        listenToGameUpdate();
        listenToChat();
        renderQuestion();
    }

    function renderQuestion() {
        if (currentQIndex >= questions.length) { finishGame(); return; }
        const data = questions[currentQIndex];
        document.getElementById('q-text').innerText = data.q;
        const box = document.getElementById('options');
        box.innerHTML = "";
        data.a.sort(() => Math.random() - 0.5).forEach(txt => {
            const b = document.createElement('button');
            b.className = 'btn'; b.innerText = txt;
            b.onclick = () => checkAnswer(txt, b);
            box.appendChild(b);
        });
    }

    function checkAnswer(ans, btn) {
        if (ans === questions[currentQIndex].c) {
            btn.classList.add('correct');
            score += 10;
            updatePositionInDB();
            setTimeout(() => { currentQIndex++; renderQuestion(); }, 500);
        } else {
            btn.classList.add('wrong');
            setTimeout(() => btn.classList.remove('wrong'), 500);
        }
    }

    function updatePositionInDB() {
        if (!sessionRef) return;
        const ref = sessionRef.child('positions/' + myRole);
        let step = (myRole === 'boy') ? 2.8 : 1.6;
        ref.transaction(pos => (pos || 0) + step);
    }

    function listenToGameUpdate() {
        sessionRef.child('positions').on('value', (snap) => {
            const pos = snap.val();
            if (pos) {
                if (pos.boy) document.getElementById('boy-player').style.left = (5 + pos.boy) + "%";
                if (pos.girl) document.getElementById('girl-player').style.left = (45 + pos.girl) + "%";
            }
        });
    }

    function listenToChat() {
        sessionRef.child('chat').on('child_added', (snap) => {
            const data = snap.val();
            if (data && data.time >= gameStartTime) {
                const container = document.getElementById(data.role + '-chat');
                if (container) {
                    const el = document.createElement('div');
                    el.className = 'emoji-bubble';
                    el.innerText = data.msg;
                    container.appendChild(el);
                    setTimeout(() => el.remove(), 1200);
                }
            }
        });
    }

    function sendEmoji(emoji) { 
        if (!sessionRef) return;
        sessionRef.child('chat').push({ role: myRole, msg: emoji, time: Date.now() }); 
    }

    function finishGame() {
        db.ref('leaderboard').push({ name: myName, score: score });
        document.getElementById('leaderboard-screen').style.display = 'flex';
        showLeaderboard();
    }

    function showLeaderboard() {
        db.ref('leaderboard').orderByChild('score').limitToLast(5).once('value', snap => {
            let html = "<tr><th>Аты</th><th>Упай</th></tr>";
            let list = [];
            snap.forEach(c => list.push(c.val()));
            list.reverse().forEach(u => html += `<tr><td style="padding:10px; border-bottom:1px solid #eee;">${u.name}</td><td>${u.score}</td></tr>`);
            document.getElementById('leader-body').innerHTML = html;
        });
    }
</script>

</body>
</html>
