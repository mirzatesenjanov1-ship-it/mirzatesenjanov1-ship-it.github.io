<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кыз Куумай: Физика</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body, html { margin: 0; padding: 0; width: 100%; min-height: 100%; overflow-x: hidden; font-family: 'Segoe UI', sans-serif; background-color: #f0f0f0; }
        
        .bg-style {
            position: fixed; inset: 0; 
            /* Сүрөт чыгышы үчүн файлдын аты туура болушу керек */
            background: url('kyz-jygyt.png') no-repeat center center; 
            background-size: cover; 
            z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }

        .overlay-container {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px; border-radius: 20px; width: 100%; max-width: 500px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .level-grid { display: grid; grid-template-columns: 1fr; gap: 8px; width: 100%; margin-top: 15px; }
        .level-btn { 
            padding: 12px; background: #2ecc71; color: white; border: none; border-radius: 12px; 
            cursor: pointer; font-weight: bold; font-size: 14px; text-align: left;
        }

        #level-screen { display: flex; }
        #setup-screen { display: none; z-index: 5001; }
        
        #sync-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); color: white; 
            z-index: 6000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }

        .game-area { position: relative; width: 100%; height: 40vh; border-bottom: 2px solid #eee; background: #fdfdfd; display: none; overflow: hidden; }
        .rider { position: absolute; bottom: 10px; width: 25%; max-width: 140px; transition: left 0.4s ease; }
        .rider video { width: 100%; height: auto; border-radius: 10px; display: block; }
        
        .quiz-area { width: 100%; min-height: 60vh; padding: 15px; display: none; flex-direction: column; align-items: center; }
        .btn { padding: 15px; margin: 5px; width: 100%; max-width: 400px; border-radius: 12px; border: 1px solid #ddd; background: #fff; font-weight: 600; cursor: pointer; }
        
        .correct-flash { background-color: #2ecc71 !important; color: white !important; }
        .wrong-flash { background-color: #e74c3c !important; color: white !important; }
        
        .primary-btn { padding: 15px 30px; background: #2ecc71; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .secondary-btn { padding: 15px 30px; background: #3498db; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #leaderboard-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 7000; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; }
        
        .emoji-msg {
            position: absolute; top: -40px; left: 50%; transform: translateX(-50%);
            font-size: 40px; animation: floatUp 2s forwards; pointer-events: none; z-index: 100;
        }

        @keyframes floatUp {
            0% { transform: translate(-50%, 0); opacity: 1; }
            100% { transform: translate(-50%, -100px); opacity: 0; }
        }
    </style>
</head>
<body onclick="initAudio()">

<!-- Музыка файлдары -->
<audio id="menuMusic" loop preload="auto"><source src="music-menu.mp3" type="audio/mpeg"></audio>
<audio id="bgMusic" loop preload="auto"><source src="music.mp3" type="audio/mpeg"></audio>

<div id="level-screen" class="bg-style">
    <div class="overlay-container">
        <h2 style="color:#2c3e50; margin:0;">КЫЗ КУУМАЙ</h2>
        <p style="color:#7f8c8d; font-size:14px;">Бөлүмдү тандаңыз:</p>
        <div class="level-grid">
            <button class="level-btn" onclick="selectLevel(0)">1️⃣ МЕХАНИКА</button>
            <button class="level-btn" onclick="selectLevel(1)">2️⃣ МОЛЕКУЛАЛЫК ФИЗИКА</button>
            <button class="level-btn" onclick="selectLevel(2)">3️⃣ ЭЛЕКТРОДИНАМИКА</button>
            <button class="level-btn" onclick="selectLevel(3)">4️⃣ ТЕРМЕЛҮҮЛӨР ЖАНА ТОЛКУНДАР</button>
            <button class="level-btn" onclick="selectLevel(4)">5️⃣ ОПТИКА</button>
            <button class="level-btn" onclick="selectLevel(5)">6️⃣ АТОМДУК ЖАНА ЯДРОЛУК ФИЗИКА</button>
            <button class="level-btn" onclick="selectLevel(6)">7️⃣ АСТРОНОМИЯ</button>
        </div>
    </div>
</div>

<div id="setup-screen" class="bg-style">
    <div class="overlay-container">
        <h2 id="display-level-name" style="color:#2ecc71;"></h2>
        <input type="text" id="player-name" placeholder="Атыңыз..." style="padding:15px; border-radius:10px; width:100%; margin-bottom:15px; border: 1px solid #ccc;">
        <div id="room-controls">
            <button class="primary-btn" onclick="createRoom()" style="width:100%;">Бөлмө түзүү</button>
            <div style="margin: 10px 0; color:#7f8c8d;">— же —</div>
            <input type="text" id="room-input" placeholder="Код..." style="padding:15px; border-radius:10px; width:100%; border: 1px solid #ccc; margin-bottom:10px;">
            <button class="secondary-btn" onclick="joinRoom()" style="width:100%;">Кошулуу</button>
        </div>
        <p id="wait-status" style="margin-top:20px; font-weight: bold; color: #e67e22;"></p>
    </div>
</div>

<div id="sync-overlay">
    <div id="sync-info">Даярсызбы?</div>
    <button id="master-start" class="primary-btn" onclick="triggerReady()">МЕН ДАЯРМЫН!</button>
    <div id="countdown" style="font-size:80px; font-weight:bold; color:#2ecc71;"></div>
</div>

<div class="game-area" id="ui-top">
    <!-- Видео файлдары -->
    <div id="boy-container" class="rider" style="left: 5%;">
        <video id="v-boy" muted loop playsinline webkit-playsinline>
            <source src="boy_run.mp4" type="video/mp4">
        </video>
    </div>
    <div id="girl-container" class="rider" style="left: 45%;">
        <video id="v-girl" muted loop playsinline webkit-playsinline>
            <source src="girl_run.mp4" type="video/mp4">
        </video>
    </div>
</div>

<div class="quiz-area" id="ui-bottom">
    <div id="q-text" style="font-weight: bold; font-size: 18px; margin-bottom: 20px; text-align: center;"></div>
    <div id="options" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
    <div id="emoji-controls" style="display: flex; justify-content: center; gap: 10px; margin-top: 20px;">
        <button onclick="sendEmoji('😂')" style="font-size: 24px; border: none; background: none; cursor: pointer;">😂</button>
        <button onclick="sendEmoji('🐎')" style="font-size: 24px; border: none; background: none; cursor: pointer;">🐎</button>
        <button onclick="sendEmoji('😜')" style="font-size: 24px; border: none; background: none; cursor: pointer;">😜</button>
        <button onclick="sendEmoji('🔥')" style="font-size: 24px; border: none; background: none; cursor: pointer;">🔥</button>
    </div>
</div>

<div id="leaderboard-screen">
    <h1 id="winner-text">Жеңүүчү!</h1>
    <button class="secondary-btn" onclick="location.reload()">Башкы меню</button>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://kyz-kuumay-game-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myRole = "", myName = "", sessionRef = null, gameActive = false;
    let selectedLevelIdx = null;
    const levelNames = ["МЕХАНИКА", "МОЛЕКУЛАЛЫК ФИЗИКА", "ЭЛЕКТРОДИНАМИКА", "ТЕРМЕЛҮҮЛӨР", "ОПТИКА", "АТОМДУК ФИЗИКА", "АСТРОНОМИЯ"];

    // 7 БӨЛҮМ БОЮНЧА ТЕСТТЕР (Документтен алынды)
    const allQuestions = [
        // 1. МЕХАНИКА (Кинематика, Динамика ж.б.)
        [
            {q:"Механиканын кыймылды изилдеген бөлүмү?", a:["Оптика","Кинематика","Термодинамика","Электродинамика"], c:"Кинематика"},
    {q:"Нерсенин кыймылы эмнеге салыштырмалуу аныкталат?", a:["Массага","Күчкө","Санак системасына","Энергияга"], c:"Санак системасына"},
    {q:"Траектория деген эмне?", a:["Масса","Көлөм","Кыймыл сызыгы","Күчтүн багыты"], c:"Кыймыл сызыгы"},
    {q:"СИ системасында жолдун бирдиги?", a:["Секунд","Ньютон","Метр","Паскаль"], c:"Метр"},
    {q:"Ылдамдыктын формуласы?", a:["v=s/t","v=s*t","v=a/t","v=F/m"], c:"v=s/t"},
    {q:"Ылдамдануунун бирдиги?", a:["м/с","м/с²","кг/м","Н"], c:"м/с²"},
    {q:"Эркин түшүүнүн ылдамдануусу (g) канчага барабар?", a:["5 м/с²","9.8 м/с²","15 м/с²","1.5 м/с²"], c:"9.8 м/с²"},
    {q:"Вектордук чоңдук кайсы?", a:["Жол","Масса","Ылдамдык","Убакыт"], c:"Ылдамдык"},
    {q:"Бир калыптагы түз сызыктуу кыймылдын графиги кандай?", a:["Түз сызык","Ийри сызык","Айлана","Парабола"], c:"Түз сызык"},
    {q:"Ылдамдануунун формуласы?", a:["a=(v-v0)/t","a=vt","a=Fm","a=s/t"], c:"a=(v-v0)/t"},
    {q:"Бурчтук ылдамдыктын бирдиги?", a:["м/с","рад/с","Гц","кг"], c:"рад/с"},
    {q:"Айлануу жыштыгынын бирдиги?", a:["Гц (Герц)","с","м","кг"], c:"Гц (Герц)"},
    {q:"Борборго умтулуучу ылдамдануу?", a:["a=v²/r","a=v/r","a=F/m","a=vt"], c:"a=v²/r"},
    {q:"Материалдык чекит деген эмне?", a:["Чоң нерсе","Өлчөмү эске алынбаган нерсе","Кичинекей топ","Планета"], c:"Өлчөмү эске алынбаган нерсе"},
    {q:"Түз сызыктуу бир калыптагы кыймылда ылдамдануу эмнеге барабар?", a:["9.8","0","10","1"], c:"0"},
    {q:"Орун которуштуруу эмнеси менен жолдон айырмаланат?", a:["Ал вектордук","Ал скалярдык","Айырмасы жок","Ал узун"], c:"Ал вектордук"},
    {q:"Айлана боюнча кыймылдын мезгили (T) деген эмне?", a:["Бир толук айлануу убактысы","Ылдамдык","Күч","Радиус"], c:"Бир толук айлануу убактысы"},
    {q:"Кайсы курал ылдамдыкты өлчөйт?", a:["Термометр","Спидометр","Барометр","Амперметр"], c:"Спидометр"},
    {q:"Секундомер эмнени өлчөйт?", a:["Массаны","Убакытты","Ылдамдыкты","Күчтү"], c:"Убакытты"},
    {q:"Нерсенин ылдамдыгы v=10+2t болсо, v0 канча?", a:["10 м/с","2 м/с","0","5 м/с"], c:"10 м/с"},
    {q:"v=20-5t болсо, ылдамдануу канча?", a:["20 м/с²","-5 м/с²","5 м/с²","0"], c:"-5 м/с²"},
    {q:"Жол скалярдык чоңдукпу?", a:["Ооба","Жок","Кээде","Белгисиз"], c:"Ооба"},
    {q:"Эркин түшүүдө нерсенин салмагы эмнеге барабар (вакуумда)?", a:["mg","0","2mg","P"], c:"0"},
    {q:"Горизонтко бурч менен атылган нерсенин траекториясы?", a:["Түз сызык","Айлана","Парабола","Гипербола"], c:"Парабола"},
    {q:"Радиусу 1м айлананы толук айланган нерсенин орун которуштуруусу?", a:["2π","1м","0","3.14м"], c:"0"},
    {q:"Дөңгөлөктүн алкагынын ылдамдыгы борборуна караганда?", a:["Бирдей","Чоң","Кичине","0"], c:"Чоң"},
    {q:"Кинематикада күч эсепке алынабы?", a:["Ооба","Жок","Кээде","Дайыма"], c:"Жок"},
    {q:"18 км/саат канча м/с?", a:["18","10","5","1"], c:"5"},
    {q:"36 км/саат канча м/с?", a:["36","20","10","5"], c:"10"},
    {q:"Кыймылдын салыштырмалуулугу эмнени билдирет?", a:["Тандалган санак системасынан көз карандылыгын","Массаны","Убакытты","Түстү"], c:"Тандалган санак системасынан көз карандылыгын"},
            {q:"Ньютондун I мыйзамы кандай аталат?", a:["Инерция мыйзамы","Динамика мыйзамы","Күч мыйзамы","Тартылуу мыйзамы"], c:"Инерция мыйзамы"},
    {q:"Ньютондун II мыйзамынын формуласы?", a:["F=ma","p=mv","F=-kx","E=mgh"], c:"F=ma"},
    {q:"Ньютондун III мыйзамы?", a:["F1=F2","F1=-F2","F=ma","m1v1=m2v2"], c:"F1=-F2"},
    {q:"Күчтүн бирдиги?", a:["Ватт","Джоуль","Ньютон","Паскаль"], c:"Ньютон"},
    {q:"Масса эмненин өлчөмү?", a:["Инерттүүлүктүн","Ылдамдыктын","Көлөмдүн","Күчтүн"], c:"Инерттүүлүктүн"},
    {q:"Бүткүл дүйнөлүк тартылуу законунун формуласы?", a:["F=ma","F=G*(m1*m2)/r²","F=-kx","P=mg"], c:"F=G*(m1*m2)/r²"},
    {q:"Салмактын (P) формуласы?", a:["P=mg","P=ma","P=mv","P=F/S"], c:"P=mg"},
    {q:"Гук мыйзамынын формуласы?", a:["F=-kx","F=ma","p=mv","A=Fs"], c:"F=-kx"},
    {q:"Сүрүлүү күчүнүн формуласы?", a:["F=μN","F=ma","F=mg","F=kx"], c:"F=μN"},
    {q:"Күчтү кайсы курал менен өлчөйт?", a:["Барометр","Динамометр","Спидометр","Вольтметр"], c:"Динамометр"},
    {q:"Гравитациялык туруктуулуктун (G) мааниси?", a:["9.8","6.67*10^-11","3*10^8","1.6*10^-19"], c:"6.67*10^-11"},
    {q:"Катуулуктун (k) бирдиги?", a:["Н/м","Н*м","Н","кг"], c:"Н/м"},
    {q:"Күч вектордук чоңдукпу?", a:["Ооба","Жок","Кээде","Билбейм"], c:"Ооба"},
    {q:"Динамика эмнени изилдейт?", a:["Кыймылдын себептерин (күчтөрдү)","Траекторияны","Жарыкты","Атомду"], c:"Кыймылдын себептерин (күчтөрдү)"},
    {q:"Сүрүлүү коэффициенти (μ) бирдикке ээби?", a:["Ооба","Жок","Метр","Ньютон"], c:"Жок"},
    {q:"Серпилгичтүү деформация деген эмне?", a:["Күч кеткенден кийин баштапкы абалына келүү","Сынуу","Эрүү","Түстүн өзгөрүшү"], c:"Күч кеткенден кийин баштапкы абалына келүү"},
    {q:"Пластикалык деформация?", a:["Баштапкы формасын сактабайт","Кайра калыбына келет","Абдан катуу","Тунук"], c:"Баштапкы формасын сактабайт"},
    {q:"Архимед күчү кайсы жакта аракет кылат?", a:["Төмөн","Жогору","Капталга","Аракет кылбайт"], c:"Жогору"},
    {q:"Нерсенин массасы 5кг болсо, салмагы канча (g=10)?", a:["5Н","50Н","0.5Н","10Н"], c:"50Н"},
    {q:"Эгер күчтөрдүн тең аракеттүүсү 0 болсо, ылдамдык кандай болот?", a:["Өсөт","Азаят","Туруктуу калат же 0 болот","Дайыма 0"], c:"Туруктуу калат же 0 болот"},
    {q:"Биринчи космостук ылдамдык?", a:["7.9 км/с","11.2 км/с","16.7 км/с","300 000 км/с"], c:"7.9 км/с"},
    {q:"Экинчи космостук ылдамдык?", a:["7.9 км/с","11.2 км/с","16.7 км/с","42 км/с"], c:"11.2 км/с"},
    {q:"Лифт өйдө ылдамдануу менен чыкса, салмак кандай өзгөрөт?", a:["Азаят","Көбөйөт","Өзгөрбөйт","0 болот"], c:"Көбөйөт"},
    {q:"Салмаксыздык качан болот?", a:["Эркин түшүүдө","Тынч турганда","Сууда","Космосто гана"], c:"Эркин түшүүдө"},
    {q:"Массанын СИ бирдиги?", a:["Грамм","Килограмм","Тонна","Ньютон"], c:"Килограмм"},
    {q:"Нерсеге 3Н жана 4Н күчтөр бир багытта аракет этсе, жыйынтык күч?", a:["1Н","7Н","5Н","12Н"], c:"7Н"},
    {q:"Күчтөр карама-каршы багытталса жыйынтык күч?", a:["Кошулат","Кемитилет","Көбөйтүлөт","Өзгөрбөйт"], c:"Кемитилет"},
    {q:"Суюктуктун ичиндеги басым эмнеге көз каранды?", a:["Тереңдикке жана тыгыздыкка","Идиштин формасына","Түскө","Убакытка"], c:"Тереңдикке жана тыгыздыкка"},
    {q:"Барометр эмнени өлчөйт?", a:["Ылдамдыкты","Атмосфералык басымды","Массаны","Токту"], c:"Атмосфералык басымды"},
    {q:"Паскаль мыйзамы эмнеге тиешелүү?", a:["Суюктуктарга жана газдарга","Катуу заттарга","Жарыкка","Электрге"], c:"Суюктуктарга жана газдарга"},
            {q:"Импульстун формуласы?", a:["p=mv","p=ma","p=mgh","p=F/S"], c:"p=mv"},
    {q:"Импульстун бирдиги?", a:["кг*м/с","Н","Дж","Вт"], c:"кг*м/с"},
    {q:"Күч импульсунун формуласы?", a:["Ft","mv","ma","mgh"], c:"Ft"},
    {q:"Механикалык жумуштун формуласы?", a:["A=Fs","A=F/s","A=p/t","A=mgh"], c:"A=Fs"},
    {q:"Жумуштун бирдиги?", a:["Ватт","Ньютон","Джоуль","Паскаль"], c:"Джоуль"},
    {q:"Кубаттуулуктун формуласы?", a:["P=A/t","P=At","P=F/s","P=mgh"], c:"P=A/t"},
    {q:"Кубаттуулуктун бирдиги?", a:["Джоуль","Ватт","Ньютон","Ампер"], c:"Ватт"},
    {q:"Кинетикалык энергиянын формуласы?", a:["Ek=mv²/2","Ek=mgh","Ek=kx²/2","Ek=Fs"], c:"Ek=mv²/2"},
    {q:"Потенциалдык энергия (бийиктик)?", a:["Ep=mgh","Ep=mv²/2","Ep=kx²/2","Ep=Pt"], c:"Ep=mgh"},

  function renderGame() {
        let qIdx = 0;
        let gameFinished = false; 
        const questions = allQuestions[selectedLevelIdx] || [{q:"Суроолор жок", a:["..."], c:"..."}];

        function showQ() {
            if (gameFinished) return;
            if (qIdx >= questions.length) {
                checkWinner("Суроолор бүттү!");
                return;
            }
            const q = questions[qIdx];
            document.getElementById('q-text').innerText = q.q;
            const optArea = document.getElementById('options'); 
            optArea.innerHTML = "";
            q.a.forEach(txt => {
                const b = document.createElement('button');
                b.className = 'btn'; b.innerText = txt;
                b.onclick = () => {
                    if (txt === q.c) {
                        sessionRef.child('pos/' + myRole).transaction(p => (p || 0) + (myRole === 'boy' ? 1.5 : 1.2));
                        b.classList.add('correct-flash');
                        setTimeout(() => { qIdx++; showQ(); }, 400);
                    } else { 
                        b.classList.add('wrong-flash'); 
                    }
                };
                optArea.appendChild(b);
            });
        }
        
        showQ();

        sessionRef.child('pos').on('value', s => {
            const p = s.val();
            if (p && !gameFinished) {
                const boyPos = 5 + (p.boy || 0);
                const girlPos = 45 + (p.girl || 0);
                
                document.getElementById('boy-container').style.left = boyPos + "%";
                document.getElementById('girl-container').style.left = girlPos + "%";

                if (boyPos >= girlPos) { 
                    checkWinner("Жигит кууп жетти!"); 
                } else if (girlPos >= 85) { 
                    checkWinner("Кыз качып кетти!"); 
                }
            }
        });

        function checkWinner(reason) {
            if (gameFinished) return;
            gameFinished = true;

            sessionRef.child('players').once('value', pSnap => {
                const names = pSnap.val();
                sessionRef.child('pos').once('value', posSnap => {
                    const finalPos = posSnap.val() || {boy: 0, girl: 0};
                    const isBoyAhead = (finalPos.boy + 5) >= (finalPos.girl + 45);
                    const winnerName = isBoyAhead ? names.boy : names.girl;

                    document.getElementById('bgMusic').pause();
                    document.getElementById('v-boy').pause();
                    document.getElementById('v-girl').pause();

                    const screen = document.getElementById('leaderboard-screen');
                    screen.style.display = "flex";
                    screen.innerHTML = `
                        <h1 style="color:#f1c40f; margin-bottom:5px;">🏆 ${winnerName} ЖЕҢДИ!</h1>
                        <p style="color:#bdc3c7; margin-bottom:20px;">${reason}</p>
                        <div style="background:rgba(255,255,255,0.1); padding:20px; border-radius:15px; width:280px; text-align:left;">
                            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                                <span>🐎 ${names.boy}:</span> 
                                <span>${Math.floor(finalPos.boy)} упай</span>
                            </div>
                            <div style="display:flex; justify-content:space-between;">
                                <span>💃 ${names.girl}:</span> 
                                <span>${Math.floor(finalPos.girl)} упай</span>
                            </div>
                        </div>
                        <button class="secondary-btn" style="margin-top:20px;" onclick="location.reload()">Башкы меню</button>
                    `;
                });
            });
        }
    }
</script>
