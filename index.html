<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кыз Куумай: Физика</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body, html { margin: 0; padding: 0; width: 100%; min-height: 100%; overflow-x: hidden; font-family: 'Segoe UI', sans-serif; }
        
        .bg-style {
            position: fixed; inset: 0; 
            background: url('kyz-jygyt.png') no-repeat center center; 
            background-size: cover; 
            z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }

        .overlay-container {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px; border-radius: 20px; width: 100%; max-width: 500px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .level-grid { display: grid; grid-template-columns: 1fr; gap: 8px; width: 100%; margin-top: 15px; }
        .level-btn { 
            padding: 12px; background: #2ecc71; color: white; border: none; border-radius: 12px; 
            cursor: pointer; font-weight: bold; font-size: 14px; text-align: left;
        }

        #level-screen { display: flex; }
        #setup-screen { display: none; z-index: 5001; }
        
        #sync-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); color: white; 
            z-index: 6000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }

        .game-area { position: relative; width: 100%; height: 40vh; border-bottom: 2px solid #eee; background: #fdfdfd; display: none; }
        .rider { position: absolute; bottom: 10px; width: 25%; max-width: 140px; transition: left 0.4s ease; }
        .rider video { width: 100%; border-radius: 10px; }
        
        .quiz-area { width: 100%; min-height: 60vh; padding: 15px; display: none; flex-direction: column; align-items: center; }
        .btn { padding: 15px; margin: 5px; width: 100%; max-width: 400px; border-radius: 12px; border: 1px solid #ddd; background: #fff; font-weight: 600; cursor: pointer; }
        
        .correct-flash { background-color: #2ecc71 !important; color: white !important; }
        .wrong-flash { background-color: #e74c3c !important; color: white !important; }
        
        .primary-btn { padding: 15px 30px; background: #2ecc71; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .secondary-btn { padding: 15px 30px; background: #3498db; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #leaderboard-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 7000; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; }
    </style>
</head>
<body onclick="startMenuMusic()">

<audio id="menuMusic" loop><source src="music-menu.mp3" type="audio/mpeg"></audio>
<audio id="bgMusic" loop><source src="music.mp3" type="audio/mpeg"></audio>

<div id="level-screen" class="bg-style">
    <div class="overlay-container">
        <h2 style="color:#2c3e50; margin:0;">КЫЗ КУУМАЙ</h2>
        <p style="color:#7f8c8d; font-size:14px;">Деңгээлди тандаңыз:</p>
        <div class="level-grid">
            <button class="level-btn" onclick="selectLevel(0)">1️⃣ МЕХАНИКА (100 СУРОО)</button>
            <button class="level-btn" onclick="selectLevel(1)">2️⃣ МОЛЕКУЛАЛЫК ФИЗИКА</button>
            <button class="level-btn" onclick="selectLevel(2)">3️⃣ ЭЛЕКТРОДИНАМИКА</button>
            <button class="level-btn" onclick="selectLevel(3)">4️⃣ ТЕРМЕЛҮҮЛӨР ЖАНА ТОЛКУНДАР</button>
            <button class="level-btn" onclick="selectLevel(4)">5️⃣ ОПТИКА</button>
            <button class="level-btn" onclick="selectLevel(5)">6️⃣ АТОМДУК ЖАНА ЯДРОЛУК ФИЗИКА</button>
            <button class="level-btn" onclick="selectLevel(6)">7️⃣ АСТРОНОМИЯ</button>
        </div>
    </div>
</div>

<div id="setup-screen" class="bg-style">
    <div class="overlay-container">
        <h2 id="display-level-name" style="color:#2ecc71;"></h2>
        <input type="text" id="player-name" placeholder="Атыңыз..." style="padding:15px; border-radius:10px; width:100%; margin-bottom:15px; border: 1px solid #ccc;">
        <div id="room-controls">
            <button class="primary-btn" onclick="createRoom()" style="width:100%;">Бөлмө түзүү</button>
            <div style="margin: 10px 0; color:#7f8c8d;">— же —</div>
            <input type="text" id="room-input" placeholder="Код..." style="padding:15px; border-radius:10px; width:100%; border: 1px solid #ccc; margin-bottom:10px;">
            <button class="secondary-btn" onclick="joinRoom()" style="width:100%;">Кошулуу</button>
        </div>
        <p id="wait-status" style="margin-top:20px; font-weight: bold; color: #e67e22;"></p>
    </div>
</div>

<div id="sync-overlay">
    <div id="sync-info">Даярсызбы?</div>
    <button id="master-start" class="primary-btn" onclick="triggerReady()">МЕН ДАЯРМЫН!</button>
    <div id="countdown" style="font-size:80px; font-weight:bold; color:#2ecc71;"></div>
</div>

<div class="game-area" id="ui-top">
    <div id="boy-container" class="rider" style="left: 5%;"><video id="v-boy" muted loop playsinline><source src="boy_run.mp4" type="video/mp4"></video></div>
    <div id="girl-container" class="rider" style="left: 45%;"><video id="v-girl" muted loop playsinline><source src="girl_run.mp4" type="video/mp4"></video></div>
</div>

<div class="quiz-area" id="ui-bottom">
    <div id="q-text" style="font-weight: bold; font-size: 18px; margin-bottom: 20px; text-align: center;"></div>
    <div id="options" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
</div>

<div id="leaderboard-screen">
    <h1 id="winner-text">Жеңүүчү!</h1>
    <button class="secondary-btn" onclick="location.reload()">Башкы меню</button>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://kyz-kuumay-game-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myRole = "", myName = "", sessionRef = null, gameActive = false;
    let selectedLevelIdx = null;
    const levelNames = ["МЕХАНИКА", "МОЛЕКУЛАЛЫК ФИЗИКА", "ЭЛЕКТРОДИНАМИКА", "ТЕРМЕЛҮҮЛӨР", "ОПТИКА", "АТОМДУК ФИЗИКА", "АСТРОНОМИЯ"];

    // СИЗ БЕРГЕН СУРООЛОРДУН МАССИВИ (МЕХАНИКА БӨЛҮМҮ)
    const mechanicsQuests = [
        {q:"Механиканын кыймылды изилдеген бөлүмү?", a:["Оптика","Кинематика","Термодинамика","Электродинамика"], c:"Кинематика"},
        {q:"Нерсенин кыймылы эмнеге салыштырмалуу аныкталат?", a:["Массага","Күчкө","Санак системасына","Энергияга"], c:"Санак системасына"},
        {q:"Траектория деген эмне?", a:["Нерсенин массасы","Нерсенин көлөмү","Кыймыл сызыгы","Күчтүн багыты"], c:"Кыймыл сызыгы"},
        {q:"SI системасында жолдун бирдиги?", a:["Секунд","Ньютон","Метр","Паскаль"], c:"Метр"},
        {q:"Ылдамдык кандай формула менен табылат?", a:["v=s/t","v=at","v=F/m","v=pt"], c:"v=s/t"},
        {q:"Убакыттын СИ бирдиги?", a:["Саат","Минут","Секунд","Күн"], c:"Секунд"},
        {q:"Бир калыптагы кыймылда ылдамдык:", a:["Өзгөрөт","Төмөндөйт","Туруктуу болот","Жоголот"], c:"Туруктуу болот"},
        {q:"Нерсенин орун алмаштыруусу — бул:", a:["Траектория узундугу","Баштапкы жана акыркы абалдын айырмасы","Убакыт","Масса"], c:"Баштапкы жана акыркы абалдын айырмасы"},
        {q:"Вектордук чоңдук кайсы?", a:["Жол","Масса","Ылдамдык","Убакыт"], c:"Ылдамдык"},
        {q:"Скаляр чоңдук кайсы?", a:["Ылдамдык","Күч","Жол","Ылдамдануу"], c:"Жол"},
        {q:"Ылдамдануунун формуласы:", a:["a=(v-v0)/t","v=at","v=F/m","v=pt"], c:"a=(v-v0)/t"},
        {q:"Ылдамдануунун СИ бирдиги?", a:["м/с","м/с²","Н","Дж"], c:"м/с²"},
        {q:"Эркин түшүүнүн ылдамдануусу канча?", a:["5 м/с²","8 м/с²","9.8 м/с²","15 м/с²"], c:"9.8 м/с²"},
        {q:"Эркин түшүүдө кайсы күч аракет кылат?", a:["Үйкөлүү күчү","Оордук күчү","Серпилгичтик күчү","Магнит күчү"], c:"Оордук күчү"},
        {q:"Бир калыпта өзгөрмө кыймылда:", a:["Ылдамдануу туруктуу","Жол нөл","Масса өзгөрөт","Убакыт токтойт"], c:"Ылдамдануу туруктуу"},
        {q:"Айланма кыймылдагы бир толук айлануу убактысы:", a:["Амплитуда","Айлануу мезгил","Импульс","Фаза"], c:"Айлануу мезгил"},
        {q:"Жыштыктын белгиси:", a:["F","ν","P","T"], c:"ν"},
        {q:"Айлануу мезгилдин СИ бирдиги?", a:["Герц","Метр","Секунд","Ньютон"], c:"Секунд"},
        {q:"Жыштыктын СИ бирдиги?", a:["Герц","Паскаль","Джоуль","Ватт"], c:"Герц"},
        {q:"Кыймылдын графиги эмнени көрсөтөт?", a:["Масса","Кыймыл мыйзамын","Күчтү","Энергияны"], c:"Кыймыл мыйзамын"},
        {q:"Ылдамдык-убакыт графигинин аянты эмнени берет?", a:["Масса","Жол","Күч","Кубат"], c:"Жол"},
        {q:"Нерсе тынч абалда болсо анын ылдамдыгы:", a:["1 м/с","10 м/с","0","-1"], c:"0"},
        {q:"Терс ылдамдык эмнени билдирет?", a:["Кыймыл жок","Карама-каршы багыттагы кыймыл","Масса аз","Убакыт токтоду"], c:"Карама-каршы багыттагы кыймыл"},
        {q:"Вектордук чоңдукка дагы бир мисал:", a:["Температура","Убакыт","Ылдамдануу","Жол"], c:"Ылдамдануу"},
        {q:"Айланма кыймылдагы ылдамдык багыты:", a:["Борборго","Радиус боюнча","Тийиштүү түз сызык боюнча","Төмөн"], c:"Тийиштүү түз сызык боюнча"},
        {q:"Радиус чоңойсо борборго умтулуучу ылдамдануу:", a:["Чоңоёт","Өзгөрбөйт","Азайат","Жоголот"], c:"Азайат"},
        {q:"Кинематика эмнени изилдейт?", a:["Жылуулукту","Күчтөрдү","Кыймылды","Электрди"], c:"Кыймылды"},
        {q:"Динамика эмнени изилдейт?", a:["Жарыкты","Күчтөрдүн таасириндеги кыймылды","Жылуулукту","Токту"], c:"Күчтөрдүн таасириндеги кыймылды"},
        {q:"Ньютондун II мыйзамынын формуласы:", a:["F=mv","F=ma","p=mv","A=Fs"], c:"F=ma"},
        {q:"Ньютондун III мыйзамы эмнени айтат?", a:["Энергия жоголот","Аракетке карама-каршы аракет бар","Масса өзгөрөт","Нерсе ысыйт"], c:"Аракетке карама-каршы аракет бар"},
        {q:"Сүрүлүү күчү эмнеге каршы аракет кылат?", a:["Массага","Кыймылга","Температурага","Жарыкка"], c:"Кыймылга"},
        {q:"Серпилгичтик күчүн ким изилдеген?", a:["Архимед","Ом","Гук","Паскаль"], c:"Гук"},
        {q:"Импульстун СИ деги бирдиги:", a:["кг·м/с","Ньютон","Ватт","Паскаль"], c:"кг·м/с"},
        {q:"Тартылуу күчүн ким ачкан?", a:["Ом","Ньютон","Фарадей","Эйнштейн"], c:"Ньютон"},
        {q:"Гравитациялык күч эмнеге көз каранды?", a:["Температурага","Массаларга жана аралыкка","Түскө","Басымга"], c:"Массаларга жана аралыкка"},
        {q:"Масса эмненин өлчөмү?", a:["Инерциянын","Температуранын","Жарыктын","Басымдын"], c:"Инерциянын"},
        {q:"Сүрүлүүнүн пайдасы эмнеде?", a:["Муздатат","Жүрүүгө жардам берет","Массаны чоңойтот","Убакытты токтойт"], c:"Жүрүүгө жардам берет"},
        {q:"Жер Айды эмне менен кармап турат?", a:["Магнит","Тартылуу күчү","Серпилгичтик","Сүрүлүү"], c:"Тартылуу күчү"}
        // Калган суроолорду ушул жерге кошуп койсоңуз болот
    ];

    const allQuestions = [
        mechanicsQuests, // Механика (Деңгээл 1)
        [{q:"Заттын 3 абалы?", a:["Катуу, суюк, газ","Ысык, муздак"], c:"Катуу, суюк, газ"}], // Деңгээл 2
        [{q:"Ток күчүнүн бирдиги?", a:["Ампер","Вольт"], c:"Ампер"}], // Деңгээл 3
        [{q:"Жыштыктын бирдиги?", a:["Герц","Секунда"], c:"Герц"}], // Деңгээл 4
        [{q:"Жарыктын ылдамдыгы?", a:["300 000 км/с","1000 км/с"], c:"300 000 км/с"}], // Деңгээл 5
        [{q:"Атомдун борборунда эмне бар?", a:["Ядро","Электрон"], c:"Ядро"}], // Деңгээл 6
        [{q:"Күн системасында канча планета бар?", a:["8","9"], c:"8"}]  // Деңгээл 7
    ];

    function startMenuMusic() {
        const m = document.getElementById('menuMusic');
        if (m.paused && !gameActive) m.play().catch(e => {});
    }

    function selectLevel(idx) {
        selectedLevelIdx = idx;
        document.getElementById('level-screen').style.display = "none";
        document.getElementById('setup-screen').style.display = "flex";
        document.getElementById('display-level-name').innerText = levelNames[idx];
        startMenuMusic();
    }

    function createRoom() {
        myName = document.getElementById('player-name').value;
        if (!myName) return alert("Атыңызды жазыңыз!");
        myRole = "boy";
        const code = Math.floor(100 + Math.random() * 899);
        document.getElementById('room-controls').style.display = "none";
        document.getElementById('wait-status').innerHTML = `Код: ${code}<br>Күтүңүз...`;
        sessionRef = db.ref('rooms/' + code);
        sessionRef.set({ players: { boy: myName }, sync: { boy: false, girl: false }, pos: { boy: 0, girl: 0 }, level: selectedLevelIdx });
        sessionRef.child('players/girl').on('value', s => { if(s.exists()) startSync(); });
    }

    function joinRoom() {
        myName = document.getElementById('player-name').value;
        const code = document.getElementById('room-input').value;
        if (!myName || !code) return alert("Маалыматты толтуруңуз!");
        myRole = "girl";
        sessionRef = db.ref('rooms/' + code);
        sessionRef.once('value', s => {
            if (s.exists() && !s.val().players.girl) {
                selectedLevelIdx = s.val().level;
                sessionRef.child('players/girl').set(myName);
                startSync();
            } else { alert("Ката же бөлмө толо!"); }
        });
    }

    function startSync() {
        document.getElementById('setup-screen').style.display = "none";
        document.getElementById('level-screen').style.display = "none";
        document.getElementById('sync-overlay').style.display = "flex";
        sessionRef.child('sync').on('value', s => {
            const sync = s.val();
            if (sync && sync.boy && sync.girl && !gameActive) startCountdown();
        });
    }

    function triggerReady() { sessionRef.child('sync/' + myRole).set(true); document.getElementById('master-start').style.display = "none"; }

    function startCountdown() {
        gameActive = true;
        let c = 3;
        const timer = setInterval(() => {
            document.getElementById('countdown').innerText = c > 0 ? c : "GO!";
            if (c === 0) { clearInterval(timer); setTimeout(launch, 500); }
            c--;
        }, 1000);
    }

    function launch() {
        document.getElementById('menuMusic').pause();
        document.getElementById('sync-overlay').style.display = "none";
        document.getElementById('ui-top').style.display = "block";
        document.getElementById('ui-bottom').style.display = "flex";
        document.getElementById('bgMusic').play();
        document.getElementById('v-boy').play();
        document.getElementById('v-girl').play();
        renderGame();
    }

    function renderGame() {
        let qIdx = 0;
        const questions = allQuestions[selectedLevelIdx];

        function showQ() {
            if (qIdx >= questions.length) return document.getElementById('leaderboard-screen').style.display = "flex";
            const q = questions[qIdx];
            document.getElementById('q-text').innerText = q.q;
            const optArea = document.getElementById('options'); optArea.innerHTML = "";
            q.a.forEach(txt => {
                const b = document.createElement('button');
                b.className = 'btn'; b.innerText = txt;
                b.onclick = () => {
                    if (txt === q.c) {
                        sessionRef.child('pos/' + myRole).transaction(p => (p || 0) + (myRole === 'boy' ? 2 : 1.5)); // 100 суроо үчүн кадамды кичирейттим
                        b.classList.add('correct-flash');
                        setTimeout(() => { qIdx++; showQ(); }, 400);
                    } else { b.classList.add('wrong-flash'); }
                };
                optArea.appendChild(b);
            });
        }
        showQ();
        sessionRef.child('pos').on('value', s => {
            const p = s.val();
            if (p) {
                document.getElementById('boy-container').style.left = (5 + (p.boy || 0)) + "%";
                document.getElementById('girl-container').style.left = (45 + (p.girl || 0)) + "%";
            }
        });
    }
</script>
</body>
</html>
