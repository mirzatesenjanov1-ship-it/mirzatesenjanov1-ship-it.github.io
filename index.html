<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кыз Куумай: Физика Online</title>

    <!-- Google AdSense Скрипти -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1495571814896964" crossorigin="anonymous"></script>

    <!-- Firebase (Лидерлер тактасы жана онлайн кыймыл үчүн) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        /* Оюндагы визуалдык эффекттер жана стилдер */
        * { box-sizing: border-box; touch-action: manipulation; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #ffffff;
        }
        
        #setup-screen, #leaderboard-screen {
            position: fixed; inset: 0; background: white; z-index: 3000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center;
        }

        .game-area {
            position: relative; width: 100%; height: 40vh;
            background: #f9f9f9; border-bottom: 2px solid #eee;
            overflow: hidden;
        }

        .rider {
            position: absolute; bottom: 10px; width: 25%;
            max-width: 150px;
            transition: left 0.4s ease-out;
        }
        .rider video { width: 100%; border-radius: 10px; }

        .quiz-area {
            width: 100%; height: 60vh; background: #ffffff;
            display: flex; flex-direction: column; align-items: center; 
            padding: 15px;
        }

        .btn {
            padding: 15px; margin: 5px; width: 100%; max-width: 400px;
            border-radius: 12px; border: 1px solid #ddd; background: #fff;
            font-weight: bold; cursor: pointer;
        }

        .ad-container { width: 100%; max-width: 320px; margin: 15px 0; min-height: 50px; }
        
        #ad-interstitial {
            position: fixed; inset: 0; background: rgba(255,255,255,0.95);
            z-index: 5000; display: none; flex-direction: column; 
            align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<!-- Оюн башталгандагы жарнамалык тыныгуу экраны -->
<div id="ad-interstitial">
    <h2 style="color: #e67e22;">Жарнамалык тыныгуу</h2>
    <div class="ad-container">
        <!-- AdSense бирдиги -->
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-1495571814896964"
             data-ad-slot="3193900890"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
    <p>Оюн 3 секунддан кийин уланат...</p>
</div>

<!-- Башкы бет -->
<div id="setup-screen">
    <h1>Кыз Куумай: Физика</h1>
    <div class="ad-container">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-1495571814896964"
             data-ad-slot="3193900890"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
    <input type="text" id="player-name" placeholder="Атыңызды жазыңыз" style="padding:15px; width:250px; margin-bottom:15px;">
    <button onclick="startGame('boy')" style="background:#2980b9; color:white;" class="btn">ЖИГИТ БОЛУП ОЙНОО</button>
    <button onclick="startGame('girl')" style="background:#e67e22; color:white;" class="btn">КЫЗ БОЛУП ОЙНОО</button>
</div>

<div class="game-area">
    <div id="boy-player" class="rider" style="left: 5%;">
        <video id="v-boy" muted loop playsinline><source src="boy_run.mp4" type="video/mp4"></video>
    </div>
    <div id="girl-player" class="rider" style="left: 45%;">
        <video id="v-girl" muted loop playsinline><source src="girl_run.mp4" type="video/mp4"></video>
    </div>
</div>

<div class="quiz-area">
    <div id="q-text" style="font-size: 20px; font-weight: bold; margin-bottom: 20px;">Суроо жүктөлүүдө...</div>
    <div id="options" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
</div>

<script>
    // Firebase жана Оюн логикасы
    const firebaseConfig = { databaseURL: "https://kyz-kuumay-game-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myRole = ""; 
    let currentQIndex = 0;
    let score = 0;

    // Сиздин 60 сурооңуз ушул жерде (кыскартылып көрсөтүлдү)
    const questions = [
        {q:"Ылдамдыктын формуласы?", a:["v=s/t","F=ma","P=mg","E=mc2"], c:"v=s/t"},
        {q:"Ылдамдануунун бирдиги?", a:["м/с2","м/с","кг","Н"], c:"м/с2"},
        // ... калган суроолорду бул жерге кошосуз
    ];

    function startGame(role) {
        myRole = role;
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('v-boy').play();
        document.getElementById('v-girl').play();
        renderQuestion();
    }

    function renderQuestion() {
        // Ар бир 10 суроодон кийин жарнама көрсөтүү
        if (currentQIndex > 0 && currentQIndex % 10 === 0) {
            showAdInterstitial();
        }

        const data = questions[currentQIndex];
        document.getElementById('q-text').innerText = data.q;
        const box = document.getElementById('options');
        box.innerHTML = "";

        data.a.forEach(txt => {
            const b = document.createElement('button');
            b.className = 'btn';
            b.innerText = txt;
            b.onclick = () => checkAnswer(txt);
            box.appendChild(b);
        });
    }

    function checkAnswer(ans) {
        if (ans === questions[currentQIndex].c) {
            score += 10;
            currentQIndex++;
            movePlayer();
            if (currentQIndex < questions.length) renderQuestion();
        } else {
            alert("Ката! Кайра аракет кылыңыз.");
        }
    }

    function movePlayer() {
        const step = (myRole === 'boy') ? 2 : 1.5;
        const player = document.getElementById(myRole + '-player');
        let currentLeft = parseFloat(player.style.left);
        player.style.left = (currentLeft + step) + "%";
    }

    function showAdInterstitial() {
        const adDiv = document.getElementById('ad-interstitial');
        adDiv.style.display = 'flex';
        setTimeout(() => {
            adDiv.style.display = 'none';
        }, 3000); // 3 секунддук жарнама тыныгуусу
    }
</script>

</body>
</html>
