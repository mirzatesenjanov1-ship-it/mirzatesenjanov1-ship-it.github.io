<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кыз Куумай: Физика Online</title>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #ffffff; }
        
        /* Акылдуу баштапкы экран */
        #setup-screen {
            position: fixed; inset: 0; background: white; z-index: 3000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center;
        }

        /* Универсалдуу Баштоо Катмары (Медиа блоктолбошу үчүн) */
        #start-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            color: white; transition: 0.3s;
        }

        .game-area { position: relative; width: 100%; height: 40vh; border-bottom: 2px solid #f0f0f0; overflow: visible; }
        .rider { position: absolute; bottom: 10px; width: 25%; max-width: 155px; transition: left 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .rider video { width: 100%; display: block; border-radius: 10px; }
        
        .quiz-area { width: 100%; height: 60vh; display: flex; flex-direction: column; align-items: center; padding: 10px; overflow-y: auto; }
        .btn { padding: 15px; font-size: 14px; border: 1.5px solid #eee; border-radius: 12px; background: #fdfdfd; cursor: pointer; font-weight: 600; width: 100%; }
        .btn.correct { background: #2ecc71 !important; color: white; }
        .btn.wrong { background: #e74c3c !important; color: white; }

        .start-btn {
            padding: 20px 40px; background: #2ecc71; color: white; border: none; 
            border-radius: 50px; font-size: 20px; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.5); animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<!-- Медиа элементтери -->
<audio id="bgMusic" loop preload="auto"><source src="music.mp3" type="audio/mpeg"></audio>

<!-- Оюнду активдештирүүчү универсалдуу экран -->
<div id="start-overlay">
    <h2 id="start-status">Түгөй табылды!</h2>
    <button class="start-btn" onclick="initMedia()">ОЮНДУ БАШТОО 🚀</button>
</div>

<div id="setup-screen">
    <h1>Кыз Куумай: Физика</h1>
    <input type="text" id="player-name" placeholder="Атыңызды жазыңыз..." style="padding:15px; border-radius:10px; width:250px; border: 2px solid #ddd; font-size: 16px; margin-bottom: 20px;">
    
    <div id="waiting-msg" style="color: #e67e22; font-weight: bold; margin-bottom: 20px; min-height: 24px;"></div>

    <div id="role-btns">
        <button onclick="checkAndJoin('boy')" style="background:#2980b9; color:white; padding:15px 30px; border-radius:30px; border:none; font-weight:bold; cursor:pointer;">ЖИГИТ</button>
        <button onclick="checkAndJoin('girl')" style="background:#e67e22; color:white; padding:15px 30px; border-radius:30px; border:none; font-weight:bold; cursor:pointer;">КЫЗ</button>
    </div>
</div>

<div class="game-area">
    <div id="boy-player" class="rider" style="left: 5%;">
        <video id="v-boy" muted loop playsinline><source src="boy_run.mp4" type="video/mp4"></video>
    </div>
    <div id="girl-player" class="rider" style="left: 45%;">
        <video id="v-girl" muted loop playsinline><source src="girl_run.mp4" type="video/mp4"></video>
    </div>
</div>

<div class="quiz-area">
    <div id="q-text" style="font-weight: bold; margin-bottom: 20px; text-align: center;"></div>
    <div id="options" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 500px;"></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://kyz-kuumay-game-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myRole = "", myName = "", currentQIndex = 0, sessionRef = null;

    // 1. Кошулуу жана Түгөй издөө
    function checkAndJoin(role) {
        const nameInput = document.getElementById('player-name');
        if (!nameInput.value.trim()) {
            alert("Сураныч, атыңызды жазыңыз!");
            return;
        }
        myName = nameInput.value;
        myRole = role;
        
        document.getElementById('role-btns').style.display = "none";
        document.getElementById('waiting-msg').innerText = "Түгөй изделүүдө...";

        db.ref('matchmaking').once('value', (snap) => {
            const sessions = snap.val();
            const oppositeRole = (role === 'boy') ? 'girl' : 'boy';
            let foundId = null;

            if (sessions) {
                for (let id in sessions) {
                    if (sessions[id][oppositeRole] && !sessions[id][role]) {
                        foundId = id; break;
                    }
                }
            }

            if (foundId) {
                db.ref('matchmaking/' + foundId).child(myRole).set(myName);
                prepareGame(foundId);
            } else {
                const newId = "game_" + Math.random().toString(36).substr(2, 9);
                const data = {}; data[myRole] = myName;
                db.ref('matchmaking/' + newId).set(data);
                
                document.getElementById('waiting-msg').innerText = "Түгөйүңүздү күтүңүз...";
                
                db.ref('matchmaking/' + newId).on('value', (s) => {
                    if (s.val() && s.val()[oppositeRole]) {
                        db.ref('matchmaking/' + newId).off();
                        prepareGame(newId);
                    }
                });
            }
        });
    }

    // 2. Оюнга даярдануу (Overlay чыгаруу)
    function prepareGame(id) {
        sessionRef = db.ref('sessions/' + id);
        document.getElementById('start-overlay').style.display = "flex";
    }

    // 3. МЕДИАНЫ ИШТЕТҮҮ (Эң маанилүү функция)
    function initMedia() {
        const music = document.getElementById('bgMusic');
        const v1 = document.getElementById('v-boy');
        const v2 = document.getElementById('v-girl');

        // Колдонуучу баскычты басканда гана ойнотууга уруксат берилет
        music.play();
        v1.play();
        v2.play();

        document.getElementById('start-overlay').style.display = "none";
        document.getElementById('setup-screen').style.display = "none";

        listenToUpdates();
        renderQuestion();
    }

    // --- Оюндун калган логикасы ---
    const questions = [
        // 1-10: Механика жана Кыймыл
        {q:"Ылдамдыктын формуласы?", a:["v=s/t","F=ma","P=mg","E=mc2"], c:"v=s/t"},
        {q:"Ылдамдануунун бирдиги?", a:["м/с2","м/с","кг","Н"], c:"м/с2"},
        {q:"Эркин түшүү ылдамдануусу канча?", a:["9.8 м/с2","100 м/с2","5 м/с2","0 м/с2"], c:"9.8 м/с2"},
        {q:"Траектория деген эмне?", a:["Кыймылдын сызыгы","Убакыт","Күч","Масса"], c:"Кыймылдын сызыгы"},
        {q:"Спидометр эмнени өлчөйт?", a:["Ылдамдыкты","Убакытты","Күчтү","Массаны"], c:"Ылдамдыкты"},
        {q:"1 км канча метр?", a:["1000","100","10","10000"], c:"1000"},
        {q:"Убакыттын бирдиги?", a:["Секунда","Метр","Ньютон","Килограмм"], c:"Секунда"},
        {q:"Түз сызыктуу бир калыптагы кыймыл?", a:["v=const","a=const","v=0","s=0"], c:"v=const"},
        {q:"1 саатта канча секунд бар?", a:["3600","60","120","1000"], c:"3600"},
        {q:"Ылдамдыктын СИ системасындагы бирдиги?", a:["м/с","км/саат","см/с","м/мин"], c:"м/с"},

        // 11-20: Динамика (Ньютондун закондору)
        {q:"Ньютондун 2-закону?", a:["F=ma","F=mg","P=mv","E=mgh"], c:"F=ma"},
        {q:"Күчтүн бирдиги?", a:["Ньютон","Жоуль","Ватт","Паскаль"], c:"Ньютон"},
        {q:"Нерсенин инерттүүлүгүнүн өлчөмү?", a:["Масса","Күч","Ылдамдык","Убакыт"], c:"Масса"},
        {q:"Салмактын формуласы?", a:["P=mg","F=ma","p=mv","A=Fs"], c:"P=mg"},
        {q:"Серпилгичтик күчү (Гук закону)?", a:["F=-kx","F=ma","F=mg","P=mv"], c:"F=-kx"},
        {q:"Үйкөлүү күчү кайда багытталат?", a:["Кыймылга каршы","Кыймыл тарапка","Өйдө","Төмөн"], c:"Кыймылга каршы"},
        {q:"Массанын бирдиги?", a:["Килограмм","Грамм","Ньютон","Литр"], c:"Килограмм"},
        {q:"Ньютондун 1-закону?", a:["Инерция закону","F=ma","F1=-F2","P=mg"], c:"Инерция закону"},
        {q:"Ньютондун 3-закону?", a:["F1=-F2","F=ma","P=mg","v=s/t"], c:"F1=-F2"},
        {q:"Күчтү өлчөөчү курал?", a:["Динамометр","Термометр","Барометр","Спидометр"], c:"Динамометр"},

        // 21-30: Басым жана Гидростатика
        {q:"Басымдын бирдиги?", a:["Паскаль","Ньютон","Жоуль","Ватт"], c:"Паскаль"},
        {q:"Архимед күчү?", a:["F=ρgV","F=ma","F=mg","P=mv"], c:"F=ρgV"},
        {q:"Басымдын формуласы?", a:["P=F/S","P=mg","A=Fs","v=s/t"], c:"P=F/S"},
        {q:"Тыгыздыктын формуласы?", a:["ρ=m/V","P=F/S","v=s/t","m=Fa"], c:"ρ=m/V"},
        {q:"Атмосфералык басымды ким өлчөгөн?", a:["Торричелли","Ньютон","Паскаль","Архимед"], c:"Торричелли"},
        {q:"Суюктуктун ичиндеги басым?", a:["p=ρgh","p=F/S","p=mv","p=m/V"], c:"p=ρgh"},
        {q:"Паскаль закону эмнеге тиешелүү?", a:["Суюктук жана газга","Катуу нерсеге","Болгону сууга","Ташка"], c:"Суюктук жана газга"},
        {q:"Тыгыздыктын бирдиги?", a:["кг/м3","кг","м3","Н/м2"], c:"кг/м3"},
        {q:"Барометр эмнени өлчөйт?", a:["Атмосфералык басымды","Ылдамдыкты","Бийиктикти","Температураны"], c:"Атмосфералык басымды"},
        {q:"Нерсе качан сууга чөгөт?", a:["F_а < F_о","F_а > F_о","F_а = F_о","Чөкпөйт"], c:"F_а < F_о"},

        // 31-40: Жумуш, Кубаттуулук, Энергия
        {q:"Механикалык жумуш?", a:["A=Fs","P=mg","E=mgh","v=s/t"], c:"A=Fs"},
        {q:"Жумуштун бирдиги?", a:["Жоуль","Ватт","Ньютон","Вольт"], c:"Жоуль"},
        {q:"Кубаттуулуктун бирдиги?", a:["Ватт","Жоуль","Паскаль","Ампер"], c:"Ватт"},
        {q:"Кинетикалык энергия?", a:["Ek=mv2/2","Ep=mgh","A=Fs","N=A/t"], c:"Ek=mv2/2"},
        {q:"Потенциалдык энергия?", a:["Ep=mgh","Ek=mv2/2","A=Fs","p=mv"], c:"Ep=mgh"},
        {q:"Кубаттуулуктун формуласы?", a:["N=A/t","A=Fs","E=mgh","P=F/S"], c:"N=A/t"},
        {q:"Пайдалуу аракет коэффициенти (ПАК)?", a:["η=(Aп/Aт)*100%","η=At/Ap","η=Fs","η=mgh"], c:"η=(Aп/Aт)*100%"},
        {q:"Энергия сакталуу закону?", a:["Жоголбойт, түрүн өзгөртөт","Жоголот","Өсөт","Азаят"], c:"Жоголбойт, түрүн өзгөртөт"},
        {q:"1 кВт канча Ватт?", a:["1000","100","10","10000"], c:"1000"},
        {q:"Толук энергия эмнеге барабар?", a:["Ek+Ep","Ek-Ep","Ek*Ep","Ap/At"], c:"Ek+Ep"},

        // 41-50: Жөнөкөй механизмдер жана Термелүүлөр
        {q:"Жылжыбаган блок?", a:["Күчтөн утуш бербейт","2 эсе берет","10 эсе берет","Жок"], c:"Күчтөн утуш бербейт"},
        {q:"Кыймылдуу блок?", a:["2 эсе утуш берет","Бербейт","10 эсе берет","3 эсе"], c:"2 эсе утуш берет"},
        {q:"Рычагдын эрежеси кимге таандык?", a:["Архимед","Ньютон","Паскаль","Гук"], c:"Архимед"},
        {q:"Күч моменти?", a:["M=Fd","A=Fs","N=At","P=mg"], c:"M=Fd"},
        {q:"Термелүү периодунун бирдиги?", a:["Секунда","Герц","Метр","М/с"], c:"Секунда"},
        {q:"Термелүү жыштыгынын бирдиги?", a:["Герц","Секунда","Ньютон","Метр"], c:"Герц"},
        {q:"Математикалык маятниктин периоду?", a:["T=2π√(l/g)","T=1/v","T=t/n","v=s/t"], c:"T=2π√(l/g)"},
        {q:"Толкун узундугунун формуласы?", a:["λ=vT","λ=v/t","λ=Fs","λ=ma"], c:"λ=vT"},
        {q:"Үн толкуну кайсы чөйрөдө таралбайт?", a:["Вакуумда","Сууда","Абада","Темирде"], c:"Вакуумда"},
        {q:"Адам кулагы уккан жыштык?", a:["20-20000 Гц","0-10 Гц","100к Гц","1 Гц"], c:"20-20000 Гц"},

        // 51-60: Жалпы жана Кайталоо
        {q:"Импульстун формуласы?", a:["p=mv","F=ma","E=mgh","A=Fs"], c:"p=mv"},
        {q:"Дененин деформациясы?", a:["Формасынын өзгөрүшү","Тынч абалы","Кыймылы","Массасы"], c:"Формасынын өзгөрүшү"},
        {q:"Инерция деген эмне?", a:["Абалын сактоо касиети","Токтоо","Ылдамдоо","Кыйроо"], c:"Абалын сактоо касиети"},
        {q:"1 МДж канча Жоуль?", a:["1 000 000","1000","100","10 000"], c:"1 000 000"},
        {q:"Оордук күчүнүн жумушу?", a:["A=mgh","A=mv2","A=Fs","A=Nt"], c:"A=mgh"},
        {q:"Гравитациялык туруктуулук (G)?", a:["6.67x10^-11","9.8","10","1"], c:"6.67x10^-11"},
        {q:"Нерсе салмаксыздык абалда качан болот?", a:["Эркин түшүүдө","Тынч турганда","Жүгүргөндө","Сууда"], c:"Эркин түшүүдө"},
        {q:"Күч моментинин бирдиги?", a:["Н*м","Н/м","Жоуль","Ватт"], c:"Н*м"},
        {q:"Алтын эреже: күчтөн канча утсак...", a:["Жолдон ошончо утулабыз","Жолдон утабыз","Эч нерсе болбойт","Убакыт утат"], c:"Жолдон ошончо утулабыз"},
        {q:"Механикалык энергиянын түрлөрү?", a:["Кинетикалык жана Потенциалдык","Ички жана сырткы","Жылуулук","Жарык"], c:"Кинетикалык жана Потенциалдык"}
    ];

    function renderQuestion() {
        if (currentQIndex >= questions.length) return;
        const q = questions[currentQIndex];
        document.getElementById('q-text').innerText = q.q;
        const opt = document.getElementById('options');
        opt.innerHTML = "";
        q.a.forEach(t => {
            const b = document.createElement('button');
            b.className = 'btn'; b.innerText = t;
            b.onclick = () => {
                if (t === q.c) {
                    b.classList.add('correct');
                    let step = (myRole === 'boy') ? 2.8 : 1.6;
                    sessionRef.child('positions/' + myRole).transaction(p => (p || 0) + step);
                    setTimeout(() => { currentQIndex++; renderQuestion(); }, 500);
                } else {
                    b.classList.add('wrong');
                }
            };
            opt.appendChild(b);
        });
    }

    function listenToUpdates() {
        sessionRef.child('positions').on('value', (s) => {
            const p = s.val();
            if (p) {
                if (p.boy) document.getElementById('boy-player').style.left = (5 + p.boy) + "%";
                if (p.girl) document.getElementById('girl-player').style.left = (45 + p.girl) + "%";
            }
        });
    }
</script>

</body>
</html>
