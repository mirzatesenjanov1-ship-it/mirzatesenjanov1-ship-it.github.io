<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кыз Куумай: Физика Online</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #fff; }
        
        #setup-screen, #sync-overlay {
            position: fixed; inset: 0; background: white; z-index: 3000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center;
        }
        #sync-overlay { background: rgba(0,0,0,0.95); color: white; display: none; z-index: 4000; }

        .game-area { position: relative; width: 100%; height: 40vh; border-bottom: 2px solid #eee; background: #fdfdfd; }
        .rider { position: absolute; bottom: 10px; width: 25%; max-width: 140px; transition: left 0.4s ease; }
        .rider video { width: 100%; border-radius: 10px; }
        
        .emoji-bubble {
            position: absolute; top: -60px; left: 50%; transform: translateX(-50%);
            background: white; border-radius: 20px; padding: 10px; font-size: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); z-index: 5000; animation: bounceUp 1.5s forwards;
        }
        @keyframes bounceUp { 0% { opacity: 0; top: 0; } 20% { opacity: 1; } 100% { opacity: 0; top: -100px; } }

        .quiz-area { width: 100%; height: 60vh; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .btn { padding: 15px; margin: 5px; width: 100%; max-width: 400px; border-radius: 12px; border: 1px solid #ddd; background: #fff; font-weight: 600; cursor: pointer; }
        
        #countdown { font-size: 100px; font-weight: bold; color: #2ecc71; }
        .primary-btn { padding: 15px 30px; background: #2ecc71; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin: 5px; }
        .secondary-btn { padding: 15px 30px; background: #3498db; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>

<audio id="bgMusic" loop preload="auto"><source src="music.mp3" type="audio/mpeg"></audio>

<div id="sync-overlay">
    <div id="sync-info">Түгөй табылды!</div>
    <button id="master-start" class="primary-btn" style="font-size: 20px; padding: 20px 40px;" onclick="triggerReady()">МЕН ДАЯРМЫН! 🚀</button>
    <div id="countdown"></div>
</div>

<div id="setup-screen">
    <h2>Кыз Куумай: Физика</h2>
    <input type="text" id="player-name" placeholder="Атыңыз..." style="padding:15px; border-radius:10px; width:250px; margin-bottom:15px; border: 1px solid #ccc;">
    
    <div id="room-controls">
        <button class="primary-btn" onclick="createRoom()">Бөлмө түзүү</button>
        <div style="margin: 10px 0; color: #7f8c8d;">— же код менен кирүү —</div>
        <input type="text" id="room-input" placeholder="Код (мис: 223)" style="padding:15px; border-radius:10px; width:150px; border: 1px solid #ccc;">
        <button class="secondary-btn" onclick="joinRoom()">Кошулуу</button>
    </div>
    <p id="wait-status" style="margin-top:20px; font-weight: bold; color: #e67e22;"></p>
</div>

<div class="game-area">
    <div id="boy-container" class="rider" style="left: 5%;">
        <div id="boy-emoji-spot"></div>
        <video id="v-boy" muted loop playsinline><source src="boy_run.mp4" type="video/mp4"></video>
    </div>
    <div id="girl-container" class="rider" style="left: 45%;">
        <div id="girl-emoji-spot"></div>
        <video id="v-girl" muted loop playsinline><source src="girl_run.mp4" type="video/mp4"></video>
    </div>
</div>

<div class="quiz-area">
    <div id="q-text" style="font-weight: bold; font-size: 18px; margin-bottom: 20px; text-align: center;"></div>
    <div id="options" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
    <div style="margin-top: 20px; display: flex; gap: 15px;">
        <button onclick="sendEmoji('😊')" style="font-size: 30px; border:none; background:none; cursor:pointer;">😊</button>
        <button onclick="sendEmoji('😂')" style="font-size: 30px; border:none; background:none; cursor:pointer;">😂</button>
        <button onclick="sendEmoji('💪')" style="font-size: 30px; border:none; background:none; cursor:pointer;">💪</button>
        <button onclick="sendEmoji('🚀')" style="font-size: 30px; border:none; background:none; cursor:pointer;">🚀</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://kyz-kuumay-game-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myRole = "", myName = "", sessionRef = null, gameActive = false;

    // --- Бөлмө Системасы ---
    function createRoom() {
        myName = document.getElementById('player-name').value;
        if (!myName) return alert("Атыңызды жазыңыз!");
        myRole = "boy";
        const code = Math.floor(100 + Math.random() * 899);
        document.getElementById('room-controls').style.display = "none";
        document.getElementById('wait-status').innerHTML = `Код: <span style="font-size:35px; color:#2ecc71;">${code}</span><br>Экинчи оюнчуга бериңиз...`;
        
        const ref = db.ref('rooms/' + code);
        ref.set({ players: { boy: myName }, sync: { boy: false, girl: false }, pos: { boy: 0, girl: 0 } });
        ref.child('players/girl').on('value', s => { if(s.exists()) initSession(code); });
        ref.onDisconnect().remove();
    }

    function joinRoom() {
        myName = document.getElementById('player-name').value;
        const code = document.getElementById('room-input').value;
        if (!myName || !code) return alert("Атыңызды жана кодду жазыңыз!");
        myRole = "girl";
        const ref = db.ref('rooms/' + code);
        ref.once('value', s => {
            if (s.exists() && !s.val().players.girl) {
                ref.child('players/girl').set(myName);
                initSession(code);
            } else { alert("Код ката же бөлмө толо!"); }
        });
    }

    function initSession(id) {
        sessionRef = db.ref('rooms/' + id);
        document.getElementById('setup-screen').style.display = "none";
        document.getElementById('sync-overlay').style.display = "flex";

        sessionRef.child('sync').on('value', s => {
            const sync = s.val();
            if (sync && sync.boy && sync.girl && !gameActive) startCountdown();
        });

        sessionRef.child('chat').on('value', s => {
            const msg = s.val();
            if (msg) {
                const spot = document.getElementById(msg.role + '-emoji-spot');
                const bubble = document.createElement('div');
                bubble.className = 'emoji-bubble'; bubble.innerText = msg.emoji;
                spot.appendChild(bubble); setTimeout(() => bubble.remove(), 1500);
            }
        });
    }

    // --- Медиа жана Синхрондошуу ---
    function triggerReady() {
        const music = document.getElementById('bgMusic');
        const v1 = document.getElementById('v-boy');
        const v2 = document.getElementById('v-girl');
        music.play().then(() => music.pause());
        v1.play().then(() => v1.pause());
        v2.play().then(() => v2.pause());

        sessionRef.child('sync/' + myRole).set(true);
        document.getElementById('master-start').style.display = "none";
        document.getElementById('sync-info').innerText = "Түгөйүңүз даярданып жатат...";
    }

    function startCountdown() {
        gameActive = true;
        let c = 3;
        const display = document.getElementById('countdown');
        const timer = setInterval(() => {
            display.innerText = c > 0 ? c : "GO!";
            if (c === 0) { clearInterval(timer); setTimeout(launch, 500); }
            c--;
        }, 1000);
    }

    function launch() {
        document.getElementById('sync-overlay').style.display = "none";
        document.getElementById('bgMusic').play();
        document.getElementById('v-boy').play();
        document.getElementById('v-girl').play();
        renderGame();
    }

    function sendEmoji(emoji) {
        if (sessionRef) sessionRef.child('chat').set({ role: myRole, emoji: emoji, t: Date.now() });
    }

    // --- Оюн жана 60 Тест ---
    function renderGame() {
        const questions = [
            {q:"Ылдамдыктын формуласы?", a:["v=s/t","F=ma","P=mg"], c:"v=s/t"},
            {q:"Ылдамдануунун бирдиги?", a:["м/с²","м/с","кг"], c:"м/с²"},
            {q:"Эркин түшүү ылдамдануусу (g)?", a:["9.8 м/с²","10 м/с²","5 м/с²"], c:"9.8 м/с²"},
            {q:"Траектория деген эмне?", a:["Кыймыл сызыгы","Убакыт","Аралык"], c:"Кыймыл сызыгы"},
            {q:"1 км канча метр?", a:["1000","100","10000"], c:"1000"},
            {q:"Ньютондун 2-закону?", a:["F=ma","F=mg","P=mv"], c:"F=ma"},
            {q:"Күчтүн бирдиги?", a:["Ньютон","Жоуль","Ватт"], c:"Ньютон"},
            {q:"Массанын бирдиги?", a:["Килограмм","Грамм","Ньютон"], c:"Килограмм"},
            {q:"Басымдын бирдиги?", a:["Паскаль","Ньютон","Жоуль"], c:"Паскаль"},
            {q:"Тыгыздыктын формуласы?", a:["ρ=m/V","P=F/S","v=s/t"], c:"ρ=m/V"},
            {q:"Жумуштун бирдиги?", a:["Жоуль","Ватт","Ньютон"], c:"Жоуль"},
            {q:"Кубаттуулуктун бирдиги?", a:["Ватт","Жоуль","Паскаль"], c:"Ватт"},
            {q:"Кинетикалык энергия?", a:["Ek=mv²/2","Ep=mgh","A=Fs"], c:"Ek=mv²/2"},
            {q:"Потенциалдык энергия?", a:["Ep=mgh","Ek=mv²/2","p=mv"], c:"Ep=mgh"},
            {q:"1 кВт канча Ватт?", a:["1000","100","10"], c:"1000"},
            {q:"Импульстун формуласы?", a:["p=mv","F=ma","E=mgh"], c:"p=mv"},
            {q:"Үн кайда таралбайт?", a:["Вакуумда","Сууда","Темирде"], c:"Вакуумда"},
            {q:"Термелүү жыштыгынын бирдиги?", a:["Герц","Секунда","Метр"], c:"Герц"},
            {q:"Күчтү өлчөөчү курал?", a:["Динамометр","Барометр","Термометр"], c:"Динамометр"},
            {q:"Атмосфералык басымды өлчөөчү курал?", a:["Барометр","Спидометр","Динамометр"], c:"Барометр"},
            {q:"Заттын үч абалы?", a:["Катуу, суюк, газ","Муздак, ысык","Жумшак, катуу"], c:"Катуу, суюк, газ"},
            {q:"Архимед күчү?", a:["F=ρgV","F=ma","P=mg"], c:"F=ρgV"},
            {q:"Ньютондун 3-закону?", a:["F1=-F2","F=ma","P=mg"], c:"F1=-F2"},
            {q:"Ток күчүнүн бирдиги?", a:["Ампер","Вольт","Ом"], c:"Ампер"},
            {q:"Чыңалуунун бирдиги?", a:["Вольт","Ампер","Ватт"], c:"Вольт"},
            {q:"Каршылыктын бирдиги?", a:["Ом","Ампер","Вольт"], c:"Ом"},
            {q:"Ом закону?", a:["I=U/R","P=UI","A=Fs"], c:"I=U/R"},
            {q:"Линзанын оптикалык күчү?", a:["Диоптрия","Метр","Ньютон"], c:"Диоптрия"},
            {q:"Жарыктын ылдамдыгы?", a:["300 000 км/с","300 км/с","1000 км/с"], c:"300 000 км/с"},
            {q:"Диффузия деген эмне?", a:["Өз алдынча аралашуу","Эрүү","Катуулануу"], c:"Өз алдынча аралашуу"},
            {q:"Температураны өлчөөчү курал?", a:["Термометр","Барометр","Омметр"], c:"Термометр"},
            {q:"Күйүүчү майдын энергиясы?", a:["Q=qm","A=Fs","P=mg"], c:"Q=qm"},
            {q:"Жылуулук берилүү түрлөрү?", a:["3 түрү бар","1 түрү бар","5 түрү бар"], c:"3 түрү бар"},
            {q:"Электрондун заряды?", a:["Терс","Оң","Нейтралдуу"], c:"Терс"},
            {q:"Протондун заряды?", a:["Оң","Терс","Нейтралдуу"], c:"Оң"},
            {q:"Нейтрондун заряды?", a:["Жок (нейтрал)","Оң","Терс"], c:"Жок (нейтрал)"},
            {q:"Магниттин канча уюлу бар?", a:["2","1","4"], c:"2"},
            {q:"Жарыктын чагылуу закону?", a:["Бурчтар барабар","Барабар эмес","90 градус"], c:"Бурчтар барабар"},
            {q:"Кулон закону эмнени сүрөттөйт?", a:["Заряддардын өз ара аракети","Кыймылды","Жылуулукту"], c:"Заряддардын өз ара аракети"},
            {q:"Конденсатор эмнени топтойт?", a:["Электр зарядын","Жылуулукту","Сууну"], c:"Электр зарядын"},
            {q:"Турактуу ток булагы?", a:["Батарея","Трансформатор","Лампочка"], c:"Батарея"},
            {q:"Күч моменти?", a:["M=Fd","A=Fs","P=mg"], c:"M=Fd"},
            {q:"Паскаль закону эмнеге тиешелүү?", a:["Суюктук жана газга","Катуу нерсеге","Болгону ташка"], c:"Суюктук жана газга"},
            {q:"Кыймылдуу блок канча утуш берет?", a:["2 эсе","Бербейт","10 эсе"], c:"2 эсе"},
            {q:"ПАКтын формуласы?", a:["η=(Ap/At)*100%","η=Fs","η=mgh"], c:"η=(Ap/At)*100%"},
            {q:"1 МДж канча Жоуль?", a:["1 000 000","1000","10 000"], c:"1 000 000"},
            {q:"Гравитациялык туруктуулук?", a:["6.67*10^-11","9.8","1"], c:"6.67*10^-11"},
            {q:"Салмаксыздык качан болот?", a:["Эркин түшүүдө","Жүгүргөндө","Уктаганда"], c:"Эркин түшүүдө"},
            {q:"Алтын эреже: күчтөн утсак...", a:["Жолдон утулабыз","Жолдон утабыз","Эч нерсе болбойт"], c:"Жолдон утулабыз"},
            {q:"Термелүү периоду?", a:["T=t/n","T=1/v","Экөө тең туура"], c:"Экөө тең туура"},
            {q:"Математикалык маятник?", a:["T=2π√(l/g)","v=s/t","F=ma"], c:"T=2π√(l/g)"},
            {q:"Адам кулагы уккан жыштык?", a:["20-20000 Гц","0-10 Гц","100к Гц"], c:"20-20000 Гц"},
            {q:"Ысык суунун тыгыздыгы?", a:["Муздактан аз","Муздактан көп","Барабар"], c:"Муздактан аз"},
            {q:"Заряддалган бөлүкчөлөрдүн иреттүү кыймылы?", a:["Электр тогу","Диффузия","Нуктануу"], c:"Электр тогу"},
            {q:"Фотоэффектти ким түшүндүргөн?", a:["Эйнштейн","Ньютон","Паскаль"], c:"Эйнштейн"},
            {q:"Күн энергиясынын булагы?", a:["Термоядролук реакция","Көмүр күйүү","Шамал"], c:"Термоядролук реакция"},
            {q:"Радиоактивдүүлүктү ким ачкан?", a:["Беккерель","Кюри","Экөө тең"], c:"Экөө тең"},
            {q:"Атомдун борборунда эмне бар?", a:["Ядро","Электрон","Боштук"], c:"Ядро"},
            {q:"Нерсе качан сууга калкып чыгат?", a:["Fa > F_о","Fa < F_о","Fa = 0"], c:"Fa > F_о"},
            {q:"Энергия сакталуу закону?", a:["Жоголбойт, түрүн өзгөртөт","Жоголот","Ар дайым азаят"], c:"Жоголбойт, түрүн өзгөртөт"}
        ];

        let qIdx = 0;
        function showQ() {
            if (qIdx >= questions.length) { document.getElementById('q-text').innerText = "Оюн бүттү!"; return; }
            const q = questions[qIdx];
            document.getElementById('q-text').innerText = q.q;
            const opt = document.getElementById('options'); opt.innerHTML = "";
            q.a.forEach(txt => {
                const b = document.createElement('button'); b.className = 'btn'; b.innerText = txt;
                b.onclick = () => {
                    if (txt === q.c) {
                        let step = (myRole === 'boy') ? 2.5 : 1.2;
                        sessionRef.child('pos/' + myRole).transaction(p => (p || 0) + step);
                        qIdx++; showQ();
                    }
                };
                opt.appendChild(b);
            });
        }
        showQ();

        sessionRef.child('pos').on('value', s => {
            const p = s.val();
            if (p) {
                document.getElementById('boy-container').style.left = (5 + (p.boy || 0)) + "%";
                document.getElementById('girl-container').style.left = (45 + (p.girl || 0)) + "%";
            }
        });
    }
</script>
</body>
</html>
